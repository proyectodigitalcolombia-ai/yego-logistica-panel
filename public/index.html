<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        /* Ajuste para que los títulos suban y no dejen espacios muertos */
        .section-header { background: var(--yego-blue); color: white; padding: 6px 12px; margin-top: 10px; font-weight: bold; border-left: 5px solid var(--yego-green); text-transform: uppercase; }
        .card-body { background: white; border: 1px solid #ddd; padding: 12px; border-top: none; }
        label { font-weight: bold; font-size: 0.72rem; color: #555; display: block; margin-top: 4px; }
        .vencido { background-color: #ffdce0 !important; border: 1px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 1px solid #ffc107 !important; }
        .btn-yego { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
        .box-sub { background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body onload="listarTodo()">

<nav class="navbar bg-dark text-white p-2">
    <div class="container d-flex justify-content-between">
        <span>YEGO LOGÍSTICA - CONTROL DE SEGURIDAD</span>
        <div>
            <button class="btn btn-outline-light btn-sm me-2" onclick="limpiarForm()">🆕 NUEVO</button>
            <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">📥 EXCEL</button>
        </div>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container mt-3 mb-5">
    <div class="row g-2 mb-3 bg-white p-2 shadow-sm border rounded">
        <div class="col-md-7"><input type="text" id="q" class="form-control" placeholder="Buscar Placa o Cédula..."></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="consultar()">BUSCAR</button></div>
        <div class="col-md-3"><button class="btn btn-yego w-100 shadow" onclick="guardar()">GUARDAR REGISTRO</button></div>
    </div>

    <form id="formYego">
        <div class="section-header">I. VEHÍCULO Y GPS</div>
        <div class="card-body row g-2">
            <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control"></div>
            <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
            <div class="col-md-2"><label>COLOR</label><input type="text" id="v_color" class="form-control"></div>
            <div class="col-md-2"><label>CLASE</label><input type="text" id="v_clase" class="form-control"></div>
            <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
            <div class="col-md-2"><label>REPOTENCIADO</label><input type="text" id="v_repo" class="form-control"></div>
            <div class="col-md-3"><label>LÍNEA</label><input type="text" id="v_linea" class="form-control"></div>
            <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
            <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
            <div class="col-md-3"><label>CARROCERÍA</label><input type="text" id="v_carro" class="form-control"></div>
            <div class="col-md-3"><label>PROVEEDOR GPS</label><input type="text" id="v_gps_co" class="form-control border-primary"></div>
            <div class="col-md-3"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
            <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
            <div class="col-md-3"><label>PLACA TRAILER</label><input type="text" id="v_trayler" class="form-control"></div>
            <div class="col-md-4"><label>MODELO TRAILER</label><input type="text" id="v_m_trailer" class="form-control"></div>
            <div class="col-md-4"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control"></div>
            <div class="col-md-4"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control"></div>
        </div>

        <div class="section-header">II. CONDUCTOR Y CONTACTO</div>
        <div class="card-body row g-2">
            <div class="col-md-4"><label>NOMBRE CONDUCTOR</label><input type="text" id="c_nom" class="form-control"></div>
            <div class="col-md-2"><label>CÉDULA</label><input type="text" id="c_cc" class="form-control"></div>
            <div class="col-md-3"><label>DIRECCIÓN RESIDENCIA</label><input type="text" id="c_dir" class="form-control"></div>
            <div class="col-md-3"><label>CORREO ELECTRÓNICO</label><input type="text" id="c_mail" class="form-control"></div>
            <div class="col-md-2"><label>CELULAR</label><input type="text" id="c_cel" class="form-control"></div>
            <div class="col-md-2"><label>LICENCIA</label><input type="text" id="c_lic" class="form-control"></div>
            <div class="col-md-2"><label>VENC. LICENCIA</label><input type="date" id="c_venc_lic" class="form-control"></div>
            <div class="col-md-2"><label class="text-danger">VENC. PLANILLA</label><input type="date" id="c_venc_planilla" class="form-control border-danger"></div>
            <div class="col-md-2"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
            <div class="col-md-2"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
        </div>

        <div class="section-header">III. TENEDOR Y PROPIETARIO</div>
        <div class="card-body row g-3">
            <div class="col-md-6">
                <div class="box-sub">
                    <label class="text-primary fw-bold mb-1">DATOS TENEDOR</label>
                    <input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre">
                    <input type="text" id="t_nit" class="form-control mb-1" placeholder="NIT">
                    <input type="text" id="t_dir" class="form-control mb-1" placeholder="Dirección">
                    <input type="text" id="t_tel" class="form-control mb-1" placeholder="Teléfono">
                    <input type="text" id="t_mail" class="form-control" placeholder="Correo">
                </div>
            </div>
            <div class="col-md-6">
                <div class="box-sub">
                    <label class="text-primary fw-bold mb-1">DATOS PROPIETARIO</label>
                    <input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre">
                    <input type="text" id="p_nit" class="form-control mb-1" placeholder="NIT">
                    <input type="text" id="p_dir" class="form-control mb-1" placeholder="Dirección">
                    <input type="text" id="p_tel" class="form-control mb-1" placeholder="Teléfono">
                    <input type="text" id="p_mail" class="form-control" placeholder="Correo">
                </div>
            </div>
        </div>

        <div class="section-header">IV. REFERENCIAS</div>
        <div class="card-body row g-2">
            <div class="col-md-4"><label>EMPRESA 1</label><input type="text" id="r_e1" class="form-control mb-1"><input type="text" id="r_t1" class="form-control"></div>
            <div class="col-md-4"><label>EMPRESA 2</label><input type="text" id="r_e2" class="form-control mb-1"><input type="text" id="r_t2" class="form-control"></div>
            <div class="col-md-4"><label>PERSONAL</label><input type="text" id="r_per" class="form-control mb-1"><input type="text" id="r_tp" class="form-control"></div>
        </div>
    </form>
</div>

<script>
    const val = (id) => document.getElementById(id).value;
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };

    async function listarTodo() {
        const res = await fetch('/listar');
        const db = await res.json();
        const tabla = document.getElementById('listaTabla');
        // El listado puede ir aquí si deseas mostrarlo abajo
    }

    async function consultar() {
        const res = await fetch(`/consultar/${val('q')}`);
        if(res.ok) llenar(await res.json()); else alert("No encontrado");
    }

    async function guardar() {
        if(!val('v_placa')) return alert("Se requiere la placa");
        const d = {
            v: { placa: val('v_placa').toUpperCase(), marca: val('v_marca'), color: val('v_color'), clase: val('v_clase'), modelo: val('v_modelo'), repo: val('v_repo'), linea: val('v_linea'), motor: val('v_motor'), chasis: val('v_chasis'), carro: val('v_carro'), trayler: val('v_trayler'), m_trailer: val('v_m_trailer'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass') },
            c: { nom: val('c_nom'), cc: val('c_cc'), cel: val('c_cel'), lic: val('c_lic'), venc_lic: val('c_venc_lic'), eps: val('c_eps'), arl: val('c_arl'), mail: val('c_mail'), dir: val('c_dir'), venc_planilla: val('c_venc_planilla') },
            t: { nom: val('t_nom'), nit: val('t_nit'), tel: val('t_tel'), mail: val('t_mail'), dir: val('t_dir') },
            p: { nom: val('p_nom'), nit: val('p_nit'), tel: val('p_tel'), mail: val('p_mail'), dir: val('p_dir') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        const res = await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert((await res.json()).mensaje);
    }

    function llenar(d) {
        if(d.v) Object.keys(d.v).forEach(k => set('v_'+k, d.v[k]));
        if(d.c) Object.keys(d.c).forEach(k => set('c_'+k, d.c[k]));
        if(d.t) Object.keys(d.t).forEach(k => set('t_'+k, d.t[k]));
        if(d.p) Object.keys(d.p).forEach(k => set('p_'+k, d.p[k]));
        if(d.r) Object.keys(d.r).forEach(k => set('r_'+k, d.r[k]));
    }

    async function importar() {
        const formData = new FormData();
        formData.append('archivo', document.getElementById('f').files[0]);
        const res = await fetch('/importar', { method: 'POST', body: formData });
        llenar(await res.json());
    }

    function limpiarForm() { document.getElementById("formYego").reset(); }
</script>
</body>
</html>
