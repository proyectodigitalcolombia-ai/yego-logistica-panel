<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA - GESTIÓN DE SEGURIDAD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; }
        .section-header { 
            background: var(--yego-blue); color: white; padding: 10px 15px; margin-top: 25px; 
            font-weight: 800; font-size: 0.95rem; border-left: 8px solid var(--yego-green); 
            text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .card-body { background: white; border: 1px solid #ddd; padding: 12px; border-top: none; }
        label { font-weight: bold; font-size: 0.7rem; color: #444; display: block; margin-top: 5px; }
        .vencido { background-color: #ffdce0 !important; border: 1px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 1px solid #ffc107 !important; }
        .btn-yego { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>

<body onload="listarTodo()">

<nav class="navbar bg-dark text-white p-2 no-pdf">
    <div class="container d-flex justify-content-between">
        <span class="fw-bold">YEGO LOGÍSTICA - SEGURIDAD OPERATIVA</span>
        <div>
            <button class="btn btn-outline-light btn-sm me-2" onclick="limpiarForm()">🆕 NUEVO REGISTRO</button>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3 mb-5 px-4">

    <!-- LISTADO -->
    <div class="card-body p-0 border shadow-sm mt-2 no-pdf">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th class="ps-3">PLACA</th>
                    <th>CONDUCTOR</th>
                    <th>VENCIMIENTOS</th>
                    <th class="text-center">GESTIÓN</th>
                </tr>
            </thead>
            <tbody id="listaTabla">
                <tr><td colspan="4" class="text-center p-4">Cargando registros...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>

const val = (id) => document.getElementById(id).value;

/* ===========================
   LISTAR REGISTROS
=========================== */
async function listarTodo() {
    const tabla = document.getElementById('listaTabla');

    try {
        const res = await fetch('/listar');
        const db = await res.json();

        if (!db || db.length === 0) {
            tabla.innerHTML = '<tr><td colspan="4" class="text-center p-4">No hay registros</td></tr>';
            return;
        }

        tabla.innerHTML = db.map(i => `
            <tr>
                <td class="fw-bold ps-3">${i.v.placa}</td>
                <td>${i.c.nom || 'S/N'}</td>
                <td>
                    SOAT: ${i.v.soat || '-'}<br>
                    TEC: ${i.v.tecno || '-'}
                </td>
                <td class="text-center">
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-danger fw-bold" onclick="descargarPDF('${i.v.placa}')">📄 PDF</button>
                    </div>
                </td>
            </tr>
        `).join('');

    } catch (error) {
        tabla.innerHTML = '<tr><td colspan="4" class="text-center text-danger p-4">Error al cargar</td></tr>';
    }
}

/* ===========================
   DESCARGAR PDF DESDE RENDER
=========================== */
async function descargarPDF(placa) {

    try {
        const response = await fetch(`/descargar-pdf/${placa}`);

        if (!response.ok) {
            alert("Error al generar el PDF");
            return;
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `Ficha_YEGO_${placa}.pdf`;
        document.body.appendChild(a);
        a.click();

        a.remove();
        window.URL.revokeObjectURL(url);

    } catch (error) {
        alert("No se pudo descargar el PDF");
        console.error(error);
    }
}

</script>

</body>
</html>
