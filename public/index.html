<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; --yego-yellow: #ffc107; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; }
        .section-header { 
            background: var(--yego-blue); color: white; padding: 12px; margin-top: 20px; 
            font-weight: 800; border-left: 8px solid var(--yego-green); text-transform: uppercase;
        }
        .card-body { background: white; border: 1px solid #ddd; padding: 15px; border-top: none; }
        label { font-weight: bold; font-size: 0.72rem; color: #555; display: block; margin-top: 8px; }
        .vencido { background-color: #ffdce0 !important; border: 2px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .no-pdf { display: block; }
    </style>
</head>
<body onload="listarTodo()">

<nav class="navbar navbar-dark bg-dark p-2 shadow">
    <div class="container-fluid d-flex justify-content-between">
        <span class="navbar-brand fw-bold">YEGO LOGÍSTICA - GESTIÓN DE RIESGOS (NODE 20)</span>
        <button class="btn btn-outline-light btn-sm" onclick="limpiarForm()">NUEVO REGISTRO</button>
    </div>
</nav>

<div class="container-fluid mt-3 mb-5 px-4">
    <div class="row g-3">
        <div class="col-lg-9">
            <div class="row g-2 mb-3 align-items-end no-pdf">
                <div class="col-md-8"><input type="text" id="q" class="form-control" placeholder="Buscar Placa..."></div>
                <div class="col-md-2"><button class="btn btn-primary w-100" onclick="consultar()">BUSCAR</button></div>
                <div class="col-md-2"><button class="btn btn-warning w-100 fw-bold" onclick="guardar()">GUARDAR</button></div>
            </div>

            <form id="formYego">
                <div class="section-header">I. INFORMACIÓN TÉCNICA DEL VEHÍCULO Y GPS</div>
                <div class="card-body row g-2">
                    <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control fw-bold"></div>
                    <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
                    <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
                    <div class="col-md-3"><label>LÍNEA</label><input type="text" id="v_linea" class="form-control"></div>
                    <div class="col-md-3"><label>COLOR</label><input type="text" id="v_color" class="form-control"></div>
                    <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
                    <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
                    <div class="col-md-3"><label>CIUDAD REGISTRO</label><input type="text" id="v_ciudad" class="form-control"></div>
                    <div class="col-md-3"><label>GPS PROVEEDOR</label><input type="text" id="v_gps_co" class="form-control"></div>
                    <div class="col-md-3"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
                    <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
                    <div class="col-md-3"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control" onchange="alerta(this.id)"></div>
                    <div class="col-md-3"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control" onchange="alerta(this.id)"></div>
                </div>

                <div class="section-header">II. DATOS DEL CONDUCTOR</div>
                <div class="card-body row g-2">
                    <div class="col-md-5"><label>NOMBRE COMPLETO</label><input type="text" id="c_nom" class="form-control"></div>
                    <div class="col-md-3"><label>CÉDULA</label><input type="text" id="c_cc" class="form-control"></div>
                    <div class="col-md-4"><label>LICENCIA</label><input type="text" id="c_lic" class="form-control"></div>
                    <div class="col-md-3"><label>VENC. LICENCIA</label><input type="date" id="c_venc_lic" class="form-control" onchange="alerta(this.id)"></div>
                    <div class="col-md-3"><label>VENC. PLANILLA</label><input type="date" id="c_venc_planilla" class="form-control" onchange="alerta(this.id)"></div>
                    <div class="col-md-3"><label>CELULAR</label><input type="text" id="c_cel" class="form-control"></div>
                    <div class="col-md-3"><label>CORREO</label><input type="text" id="c_mail" class="form-control"></div>
                </div>

                <div class="section-header">IV. REFERENCIAS</div>
                <div class="card-body row g-2">
                    <div class="col-md-4"><label>LABORAL 1</label><input type="text" id="r_e1" class="form-control mb-1" placeholder="Empresa"><input type="text" id="r_t1" class="form-control" placeholder="Tel"></div>
                    <div class="col-md-4"><label>LABORAL 2</label><input type="text" id="r_e2" class="form-control mb-1" placeholder="Empresa"><input type="text" id="r_t2" class="form-control" placeholder="Tel"></div>
                    <div class="col-md-4"><label>PERSONAL</label><input type="text" id="r_per" class="form-control mb-1" placeholder="Nombre"><input type="text" id="r_tp" class="form-control" placeholder="Tel"></div>
                </div>
            </form>
        </div>

        <div class="col-lg-3">
            <div class="card bg-dark text-white p-3 mb-2 shadow-sm"><h6>BASE DE DATOS</h6></div>
            <div class="bg-white border rounded shadow-sm p-0" style="max-height: 500px; overflow-y: auto;">
                <table class="table table-sm table-hover mb-0">
                    <tbody id="listaTabla"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };
    const val = (id) => document.getElementById(id).value;

    async function listarTodo() {
        const res = await fetch('/listar');
        const db = await res.json();
        document.getElementById('listaTabla').innerHTML = db.map(i => `
            <tr>
                <td class="p-2"><strong>${i.v.placa}</strong><br><small>${i.c.nom}</small></td>
                <td class="text-end p-2">
                    <button class="btn btn-danger btn-sm" onclick="descargarPDF('${i.v.placa}')">PDF</button>
                    <button class="btn btn-primary btn-sm" onclick="cargar('${i.v.placa}')">👁️</button>
                </td>
            </tr>`).join('');
    }

    async function guardar() {
        const payload = {
            v: { placa: val('v_placa').toUpperCase(), marca: val('v_marca'), modelo: val('v_modelo'), linea: val('v_linea'), color: val('v_color'), motor: val('v_motor'), chasis: val('v_chasis'), ciudad: val('v_ciudad'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass'), soat: val('v_soat'), tecno: val('v_tecno') },
            c: { nom: val('c_nom'), cc: val('c_cc'), lic: val('c_lic'), venc_lic: val('c_venc_lic'), venc_planilla: val('c_venc_planilla'), cel: val('c_cel'), mail: val('c_mail') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        alert("Guardado"); listarTodo();
    }

    async function consultar() {
        const res = await fetch(`/consultar/${val('q')}`);
        if(res.ok) { const d = await res.json(); llenar(d); }
    }

    function llenar(d) {
        Object.keys(d.v).forEach(k => set(k==='user'?'v_gps_user':k==='pass'?'v_gps_pass':'v_'+k, d.v[k]));
        Object.keys(d.c).forEach(k => set('c_'+k, d.c[k]));
        Object.keys(d.r).forEach(k => set('r_'+k, d.r[k]));
    }

    function descargarPDF(placa) { window.open(`/descargar-pdf/${placa}`, '_blank'); }
    function cargar(p) { document.getElementById('q').value = p; consultar(); }
    function limpiarForm() { document.getElementById("formYego").reset(); }
    function alerta(id) {
        const e = document.getElementById(id); const d = (new Date(e.value) - new Date()) / 86400000;
        e.classList.remove('vencido', 'por-vencer');
        if(d < 0) e.classList.add('vencido'); else if(d <= 10) e.classList.add('por-vencer');
    }
</script>
</body>
</html>
