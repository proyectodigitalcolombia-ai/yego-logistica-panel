<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f7f6; font-family: sans-serif; }
        .section-header { background: var(--yego-blue); color: white; font-weight: bold; padding: 6px 12px; margin-top: 25px; font-size: 0.85rem; border-left: 5px solid var(--yego-green); }
        .form-control { border-radius: 0; font-size: 0.85rem; border: 1px solid #ccc; }
        .vencido { background-color: #ffdce0 !important; border: 2px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .label-venc { font-size: 0.7rem; color: #d63384; font-weight: bold; text-transform: uppercase; }
        label { font-size: 0.75rem; font-weight: 600; color: #444; }
    </style>
</head>
<body>

<nav class="navbar bg-dark text-white p-2">
    <div class="container d-flex justify-content-between align-items-center">
        <h5 class="mb-0">YEGO LOGÍSTICA - SISTEMA CENTRAL</h5>
        <div>
            <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">📥 IMPORTAR EXCEL</button>
            <input type="file" id="f" style="display:none" onchange="importar()">
        </div>
    </div>
</nav>

<div class="container mt-3 mb-5">
    <div class="bg-white p-4 shadow-sm border rounded">
        <div class="row g-2 mb-4">
            <div class="col-md-7"><input type="text" id="q" class="form-control form-control-lg" placeholder="Buscar por Placa o Cédula..."></div>
            <div class="col-md-2"><button class="btn btn-primary btn-lg w-100 fw-bold" onclick="consultar()">BUSCAR</button></div>
            <div class="col-md-3"><button class="btn btn-warning btn-lg w-100 fw-bold shadow-sm" onclick="guardar()">CREAR / ACTUALIZAR</button></div>
        </div>

        <form id="formYego">
            <div class="section-header">I. INFORMACIÓN DEL VEHÍCULO</div>
            <div class="row g-2 mt-1">
                <div class="col-md-3"><label>Placa</label><input type="text" id="placa" class="form-control"></div>
                <div class="col-md-3"><label>Venc. SOAT</label><input type="date" id="v_soat" class="form-control"></div>
                <div class="col-md-3"><label>Venc. Tecno</label><input type="date" id="v_tecno" class="form-control"></div>
                <div class="col-md-3"><label>GPS Empresa</label><input type="text" id="gps_co" class="form-control"></div>
            </div>

            <div class="section-header">II. INFORMACIÓN DEL CONDUCTOR Y SEGURIDAD SOCIAL</div>
            <div class="row g-2 mt-1">
                <div class="col-md-4"><label>Nombre Completo</label><input type="text" id="c_nom" class="form-control"></div>
                <div class="col-md-4"><label>Cédula</label><input type="text" id="c_cc" class="form-control"></div>
                <div class="col-md-4"><label class="label-venc">Venc. Cédula</label><input type="date" id="c_venc_cc" class="form-control"></div>
                
                <div class="col-md-3"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
                <div class="col-md-3"><label class="label-venc">Venc. EPS</label><input type="date" id="c_venc_eps" class="form-control"></div>
                <div class="col-md-3"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
                <div class="col-md-3"><label class="label-venc">Venc. ARL</label><input type="date" id="c_venc_arl" class="form-control"></div>
                
                <div class="col-md-4"><label>Fondo de Pensión</label><input type="text" id="c_pension" class="form-control"></div>
                <div class="col-md-4"><label class="label-venc">Venc. Planilla Seguridad Social</label><input type="date" id="c_venc_planilla" class="form-control"></div>
                <div class="col-md-4"><label>Correo Electrónico</label><input type="text" id="c_mail" class="form-control"></div>
            </div>

            <div class="section-header">III. TENEDOR / PROPIETARIO</div>
            <div class="row g-2 mt-1">
                <div class="col-md-6"><label>Tenedor</label><input type="text" id="t_nom" class="form-control"></div>
                <div class="col-md-6"><label>Propietario</label><input type="text" id="p_nom" class="form-control"></div>
            </div>

            <div class="section-header">IV. REFERENCIAS (EMPRESAS Y PERSONALES)</div>
            <div class="row g-2 mt-1">
                <div class="col-md-4"><label>Ref. Empresa 1</label><input type="text" id="r_e1" class="form-control" placeholder="Nombre Empresa"></div>
                <div class="col-md-4"><label>Teléfono Empresa 1</label><input type="text" id="r_t1" class="form-control"></div>
                <div class="col-md-4"><label>Ref. Personal</label><input type="text" id="r_per" class="form-control" placeholder="Nombre Completo"></div>
                
                <div class="col-md-4"><label>Ref. Empresa 2</label><input type="text" id="r_e2" class="form-control" placeholder="Nombre Empresa"></div>
                <div class="col-md-4"><label>Teléfono Empresa 2</label><input type="text" id="r_t2" class="form-control"></div>
                <div class="col-md-4"><label>Teléfono Ref. Personal</label><input type="text" id="r_tp" class="form-control"></div>
            </div>
        </form>
    </div>
</div>

<script>
    function alerta(id, label) {
        const el = document.getElementById(id);
        if(!el) return "";
        const f = el.value; el.classList.remove('vencido', 'por-vencer');
        if(!f) return "";
        const diff = (new Date(f) - new Date()) / 86400000;
        if(diff < 0) { el.classList.add('vencido'); return `❌ ${label} VENCIDO\n`; }
        if(diff <= 15) { el.classList.add('por-vencer'); return `⚠️ ${label} vence pronto\n`; }
        return "";
    }

    async function consultar() {
        const res = await fetch(`/consultar/${document.getElementById('q').value}`);
        if(res.ok) llenar(await res.json()); else alert("Vehículo no encontrado en la base de datos.");
    }

    async function guardar() {
        const d = {
            v: { placa: val('placa'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('gps_co') },
            c: { 
                nom: val('c_nom'), cc: val('c_cc'), venc_cc: val('c_venc_cc'),
                eps: val('c_eps'), venc_eps: val('c_venc_eps'),
                arl: val('c_arl'), venc_arl: val('c_venc_arl'),
                pension: val('c_pension'), venc_planilla: val('c_venc_planilla'), mail: val('c_mail')
            },
            t: { nom: val('t_nom') }, 
            p: { nom: val('p_nom') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        const res = await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert((await res.json()).mensaje);
    }

    function llenar(d) {
        document.getElementById('placa').value = d.v.placa || '';
        document.getElementById('v_soat').value = d.v.soat || '';
        document.getElementById('v_tecno').value = d.v.tecno || '';
        document.getElementById('c_nom').value = d.c.nom || '';
        document.getElementById('c_cc').value = d.c.cc || '';
        document.getElementById('c_venc_cc').value = d.c.venc_cc || '';
        document.getElementById('c_eps').value = d.c.eps || '';
        document.getElementById('c_venc_eps').value = d.c.venc_eps || '';
        document.getElementById('c_arl').value = d.c.arl || '';
        document.getElementById('c_venc_arl').value = d.c.venc_arl || '';
        document.getElementById('c_pension').value = d.c.pension || '';
        document.getElementById('c_venc_planilla').value = d.c.venc_planilla || '';
        document.getElementById('c_mail').value = d.c.mail || '';
        document.getElementById('t_nom').value = d.t.nom || '';
        document.getElementById('p_nom').value = d.p.nom || '';
        // Referencias
        document.getElementById('r_e1').value = d.r.e1 || '';
        document.getElementById('r_t1').value = d.r.t1 || '';
        document.getElementById('r_e2').value = d.r.e2 || '';
        document.getElementById('r_t2').value = d.r.t2 || '';
        document.getElementById('r_per').value = d.r.per || '';
        document.getElementById('r_tp').value = d.r.tp || '';

        setTimeout(() => {
            let m = alerta('v_soat', 'SOAT') + alerta('v_tecno', 'TECNO') + 
                    alerta('c_venc_cc', 'CÉDULA') + alerta('c_venc_eps', 'EPS') + 
                    alerta('c_venc_arl', 'ARL') + alerta('c_venc_planilla', 'PLANILLA');
            if(m) alert(m);
        }, 500);
    }
    function val(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
