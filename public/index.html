<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; }
        .section-header { 
            background: var(--yego-blue); color: white; padding: 10px 15px; margin-top: 25px; 
            font-weight: 800; font-size: 0.95rem; border-left: 8px solid var(--yego-green); 
            text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .card-body { background: white; border: 1px solid #ddd; padding: 12px; border-top: none; }
        label { font-weight: bold; font-size: 0.7rem; color: #444; display: block; margin-top: 5px; }
        .vencido { background-color: #ffdce0 !important; border: 1px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 1px solid #ffc107 !important; }
        .btn-yego { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
        .box-sub { background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 4px; height: 100%; }
        .alert-item { padding: 8px; border-radius: 5px; margin-bottom: 8px; border-left: 5px solid #ccc; background: #fff; font-size: 0.75rem; }
        .alert-danger { border-left-color: #dc3545; background: #fdf2f2; }
        .alert-warning { border-left-color: #ffc107; background: #fffbeb; }
        .alert-success { border-left-color: #28a745; background: #f4faf6; }
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body onload="listarTodo()">

<nav class="navbar bg-dark text-white p-2 no-pdf">
    <div class="container d-flex justify-content-between">
        <span class="fw-bold">YEGO LOGÍSTICA - SEGURIDAD VIAL</span>
        <div>
            <button class="btn btn-danger btn-sm fw-bold me-2" onclick="generarPDF()">📥 DESCARGAR PDF</button>
            <button class="btn btn-warning btn-sm fw-bold me-2" onclick="generarPlantilla()">📥 EXCEL</button>
            <button class="btn btn-outline-light btn-sm me-2" onclick="limpiarForm()">🆕 NUEVO</button>
            <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">📤 IMPORTAR EXCEL</button>
        </div>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container-fluid mt-3 mb-5 px-4">
    <div class="row g-3">
        <div class="col-lg-9" id="area-pdf">
            <div class="row g-2 mb-3 bg-white p-3 shadow-sm border rounded no-pdf">
                <div class="col-md-7"><input type="text" id="q" class="form-control" placeholder="Buscar Placa o Cédula..."></div>
                <div class="col-md-2"><button class="btn btn-primary w-100" onclick="consultar()">BUSCAR</button></div>
                <div class="col-md-3"><button class="btn btn-yego w-100" onclick="guardar()">GUARDAR REGISTRO</button></div>
            </div>

            <form id="formYego">
                <div class="section-header">I. VEHÍCULO Y GPS</div>
                <div class="card-body row g-2">
                    <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control"></div>
                    <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
                    <div class="col-md-2"><label>COLOR</label><input type="text" id="v_color" class="form-control"></div>
                    <div class="col-md-2"><label>CLASE</label><input type="text" id="v_clase" class="form-control"></div>
                    <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
                    <div class="col-md-2"><label>REPOTENCIADO</label><input type="text" id="v_repo" class="form-control"></div>
                    <div class="col-md-3"><label>LÍNEA</label><input type="text" id="v_linea" class="form-control"></div>
                    <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
                    <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
                    <div class="col-md-3"><label>CARROCERÍA</label><input type="text" id="v_carro" class="form-control"></div>
                    <div class="col-md-3"><label>PROVEEDOR GPS</label><input type="text" id="v_gps_co" class="form-control border-primary"></div>
                    <div class="col-md-3"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
                    <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
                    <div class="col-md-3"><label>PLACA TRAILER</label><input type="text" id="v_trayler" class="form-control"></div>
                    <div class="col-md-4"><label>MODELO TRAILER</label><input type="text" id="v_m_trailer" class="form-control"></div>
                    <div class="col-md-4"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control" onchange="alerta(this.id)"></div>
                    <div class="col-md-4"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control" onchange="alerta(this.id)"></div>
                </div>

                <div class="section-header">II. CONDUCTOR Y SEGURIDAD SOCIAL</div>
                <div class="card-body row g-2">
                    <div class="col-md-4"><label>NOMBRE COMPLETO</label><input type="text" id="c_nom" class="form-control"></div>
                    <div class="col-md-4">
                        <label>DOCUMENTO IDENTIDAD</label>
                        <div class="input-group">
                            <select id="c_tipo" class="form-select" style="max-width: 90px;">
                                <option value="CC">CC</option><option value="CE">CE</option><option value="PPT">PPT</option><option value="PAS">PAS</option>
                            </select>
                            <input type="text" id="c_cc" class="form-control" placeholder="Número">
                        </div>
                    </div>
                    <div class="col-md-2"><label>LICENCIA</label><input type="text" id="c_lic" class="form-control"></div>
                    <div class="col-md-2"><label>VENC. LICENCIA</label><input type="date" id="c_venc_lic" class="form-control" onchange="alerta(this.id)"></div>
                    <div class="col-md-2"><label>CELULAR</label><input type="text" id="c_cel" class="form-control"></div>
                    <div class="col-md-3"><label>DIRECCIÓN CONDUCTOR</label><input type="text" id="c_dir" class="form-control"></div>
                    <div class="col-md-3"><label>CORREO CONDUCTOR</label><input type="text" id="c_mail" class="form-control"></div>
                    <div class="col-md-4"><label class="text-danger">VENC. PLANILLA</label><input type="date" id="c_venc_planilla" class="form-control border-danger" onchange="alerta(this.id)"></div>
                    <div class="col-md-4"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
                    <div class="col-md-4"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
                    <div class="col-md-4"><label>FONDO PENSIÓN</label><input type="text" id="c_pension" class="form-control"></div>
                </div>

                <div class="section-header">III. TENEDOR Y PROPIETARIO</div>
                <div class="card-body row g-3">
                    <div class="col-md-6">
                        <div class="box-sub">
                            <label class="text-primary fw-bold">DATOS DEL TENEDOR</label>
                            <input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre/Razón Social">
                            <div class="input-group mb-1">
                                <select id="t_tipo" class="form-select" style="max-width: 90px;"><option value="NIT">NIT</option><option value="CC">CC</option></select>
                                <input type="text" id="t_nit" class="form-control" placeholder="Número">
                            </div>
                            <input type="text" id="t_dir" class="form-control mb-1" placeholder="Dirección">
                            <input type="text" id="t_tel" class="form-control mb-1" placeholder="Teléfono">
                            <input type="text" id="t_mail" class="form-control" placeholder="Correo">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="box-sub">
                            <label class="text-primary fw-bold">DATOS DEL PROPIETARIO</label>
                            <input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre/Razón Social">
                            <div class="input-group mb-1">
                                <select id="p_tipo" class="form-select" style="max-width: 90px;"><option value="CC">CC</option><option value="NIT">NIT</option></select>
                                <input type="text" id="p_nit" class="form-control" placeholder="Número">
                            </div>
                            <input type="text" id="p_dir" class="form-control mb-1" placeholder="Dirección">
                            <input type="text" id="p_tel" class="form-control mb-1" placeholder="Teléfono">
                            <input type="text" id="p_mail" class="form-control" placeholder="Correo">
                        </div>
                    </div>
                </div>

                <div class="section-header">IV. REFERENCIAS</div>
                <div class="card-body row g-2">
                    <div class="col-md-4"><label>EMPRESA 1</label><input type="text" id="r_e1" class="form-control mb-1"><input type="text" id="r_t1" class="form-control" placeholder="Tel"></div>
                    <div class="col-md-4"><label>EMPRESA 2</label><input type="text" id="r_e2" class="form-control mb-1"><input type="text" id="r_t2" class="form-control" placeholder="Tel"></div>
                    <div class="col-md-4"><label>PERSONAL</label><input type="text" id="r_per" class="form-control mb-1"><input type="text" id="r_tp" class="form-control" placeholder="Tel"></div>
                </div>
            </form>
        </div>

        <div class="col-lg-3 no-pdf">
            <div class="sticky-top" style="top: 20px;">
                <div class="card bg-dark text-white p-3 mb-2 shadow">
                    <h6 class="mb-0 text-warning">⚠️ PANEL DE ALERTAS</h6>
                    <small id="placa-activa">Placa: -</small>
                </div>
                <div id="panel-vencimientos" class="p-3 border rounded bg-white shadow-sm" style="min-height: 200px;">
                    <p class="text-muted text-center mt-4">Consulta una placa...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="section-header mt-4 no-pdf">V. LISTADO DE REGISTROS</div>
    <div class="card-body p-0 border shadow-sm mt-2 no-pdf">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr><th>PLACA</th><th>CONDUCTOR</th><th>SOAT</th><th>TECNO</th><th>ACCIONES</th></tr>
            </thead>
            <tbody id="listaTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const val = (id) => document.getElementById(id).value;
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };

    async function listarTodo() {
        const res = await fetch('/listar');
        const db = await res.json();
        const tabla = document.getElementById('listaTabla');
        tabla.innerHTML = db.map(i => `
            <tr>
                <td class="fw-bold ps-3">${i.v.placa}</td>
                <td>${i.c.nom}</td>
                <td>${i.v.soat || '-'}</td>
                <td>${i.v.tecno || '-'}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="cargar('${i.v.placa}')">VER</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminar('${i.v.placa}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    async function eliminar(p) {
        const pass = prompt(`Confirmar eliminación de ${p}:`);
        if(!pass) return;
        const res = await fetch(`/eliminar/${p}`, { method: 'DELETE', headers: { 'admin-password': pass } });
        if(res.ok) { alert("Eliminado."); listarTodo(); } else alert("Clave incorrecta.");
    }

    async function consultar() {
        const res = await fetch(`/consultar/${val('q')}`);
        if(res.ok) {
            const data = await res.json();
            llenar(data);
            actualizarDashboard(data);
        } else alert("No encontrado");
    }

    function actualizarDashboard(d) {
        document.getElementById('placa-activa').innerText = `Placa: ${d.v.placa}`;
        const panel = document.getElementById('panel-vencimientos');
        panel.innerHTML = '<h6 class="fw-bold mb-3 border-bottom pb-1">Estado de Vencimientos</h6>';
        const fcs = [{n:'SOAT',f:d.v.soat},{n:'TECNO',f:d.v.tecno},{n:'LICENCIA',f:d.c.venc_lic},{n:'PLANILLA',f:d.c.venc_planilla}];
        fcs.forEach(f => {
            if(!f.f) return;
            const diff = Math.ceil((new Date(f.f) - new Date()) / 86400000);
            let c = 'alert-success', i = '✅', m = `Faltan ${diff} días`;
            if(diff < 0) { c = 'alert-danger'; i = '❌'; m = 'VENCIDO'; }
            else if(diff <= 10) { c = 'alert-warning'; i = '⚠️'; }
            panel.innerHTML += `<div class="alert-item ${c}"><strong>${f.n}:</strong> ${f.f}<br><small>${m}</small></div>`;
        });
    }

    async function guardar() {
        if(!val('v_placa')) return alert("Falta Placa");
        const d = {
            v: { placa: val('v_placa').toUpperCase(), marca: val('v_marca'), color: val('v_color'), clase: val('v_clase'), modelo: val('v_modelo'), repo: val('v_repo'), linea: val('v_linea'), motor: val('v_motor'), chasis: val('v_chasis'), carro: val('v_carro'), trayler: val('v_trayler'), m_trailer: val('v_m_trailer'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass') },
            c: { tipo: val('c_tipo'), nom: val('c_nom'), cc: val('c_cc'), cel: val('c_cel'), lic: val('c_lic'), venc_lic: val('c_venc_lic'), eps: val('c_eps'), arl: val('c_arl'), pension: val('c_pension'), venc_planilla: val('c_venc_planilla'), mail: val('c_mail'), dir: val('c_dir') },
            t: { tipo: val('t_tipo'), nom: val('t_nom'), nit: val('t_nit'), tel: val('t_tel'), mail: val('t_mail'), dir: val('t_dir') },
            p: { tipo: val('p_tipo'), nom: val('p_nom'), nit: val('p_nit'), tel: val('p_tel'), mail: val('p_mail'), dir: val('p_dir') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        const res = await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        const r = await res.json(); alert(r.mensaje); listarTodo();
    }

    function llenar(d) {
        if(d.v) Object.keys(d.v).forEach(k => {
            if(k === 'user') set('v_gps_user', d.v[k]);
            else if(k === 'pass') set('v_gps_pass', d.v[k]);
            else set('v_'+k, d.v[k]);
        });
        if(d.c) Object.keys(d.c).forEach(k => set('c_'+k, d.c[k]));
        if(d.t) Object.keys(d.t).forEach(k => set('t_'+k, d.t[k]));
        if(d.p) Object.keys(d.p).forEach(k => set('p_'+k, d.p[k]));
        if(d.r) Object.keys(d.r).forEach(k => set('r_'+k, d.r[k]));
        ['v_soat', 'v_tecno', 'c_venc_lic', 'c_venc_planilla'].forEach(alerta);
    }

    function alerta(id) {
        const el = document.getElementById(id); if(!el || !el.value) return;
        const diff = (new Date(el.value) - new Date()) / 86400000;
        el.classList.remove('vencido', 'por-vencer');
        if(diff < 0) el.classList.add('vencido'); else if(diff <= 10) el.classList.add('por-vencer');
    }

    function limpiarForm() { document.getElementById("formYego").reset(); }
    function cargar(p) { document.getElementById('q').value = p; consultar(); }

    async function importar() {
        const f = document.getElementById('f').files[0]; if(!f) return;
        const fd = new FormData(); fd.append('archivo', f);
        const res = await fetch('/importar', { method: 'POST', body: fd });
        llenar(await res.json()); alert("Importado.");
    }

    function generarPDF() {
        const el = document.getElementById('area-pdf');
        const p = val('v_placa') || 'FICHA';
        html2pdf().set({ margin: 10, filename: `YEGO_${p}.pdf`, image: {type:'jpeg', quality:0.98}, html2canvas: {scale:2}, jsPDF: {unit:'mm', format:'a4', orientation:'portrait'} }).from(el).save();
    }

    function generarPlantilla() {
        let pArr = Array.from({ length: 30 }, () => Array(10).fill(""));
        pArr[1] = ["", "PLACA", "", "", "MARCA", "", "", "COLOR"];
        pArr[2] = ["", val('v_placa'), "", "", val('v_marca'), "", "", val('v_color')];
        pArr[3] = ["", "CLASE", "", "", "MODELO", "", "", "REPOTENCIADO"];
        pArr[3][1] = val('v_clase'); pArr[3][4] = val('v_modelo'); pArr[3][7] = val('v_repo');
        pArr[4] = ["", "LÍNEA", "", "", "MOTOR", "", "", "CHASIS"];
        pArr[4][1] = val('v_linea'); pArr[4][4] = val('v_motor'); pArr[4][7] = val('v_chasis');
        pArr[5] = ["", "PROVEEDOR GPS", "", "", "USUARIO GPS", "", "", "CLAVE GPS"];
        pArr[5][1] = val('v_gps_co'); pArr[5][4] = val('v_gps_user'); pArr[5][7] = val('v_gps_pass');
        pArr[6] = ["", "PLACA TRAILER", "", "", "CARROCERÍA", "", "", "MOD. TRAILER"];
        pArr[6][1] = val('v_trayler'); pArr[6][4] = val('v_carro'); pArr[6][7] = val('v_m_trailer');
        pArr[7] = ["", "VENC. SOAT", "", "", "VENC. TECNO"];
        pArr[7][1] = val('v_soat'); pArr[7][4] = val('v_tecno');
        pArr[9] = ["", "NOMBRE COMPLETO", "", "", "TIPO", "IDENTIFICACIÓN", "", "LICENCIA"];
        pArr[10] = ["", val('c_nom'), "", "", val('c_tipo'), val('c_cc'), "", val('c_lic')];
        pArr[11] = ["", "", "", "", "VENC. LICENCIA"]; pArr[11][4] = val('c_venc_lic');
        pArr[12] = ["", "DIRECCIÓN", "", "", "CORREO"]; pArr[12][1] = val('c_dir'); pArr[12][4] = val('c_mail');
        pArr[13] = ["", "CELULAR", "", "", "ARL", "", "", "EPS"]; pArr[13][1] = val('c_cel'); pArr[13][4] = val('c_arl'); pArr[13][7] = val('c_eps');
        pArr[14] = ["", "", "", "", "FONDO PENSIÓN"]; pArr[14][4] = val('c_pension');
        pArr[16] = ["", "TENEDOR", "", "", "TIPO", "DOCUMENTO", "", "DIRECCIÓN"];
        pArr[16][1] = val('t_nom'); pArr[16][4] = val('t_tipo'); pArr[16][5] = val('t_nit'); pArr[16][7] = val('t_dir');
        pArr[17] = ["", val('t_tel'), "", "", val('t_mail')];
        pArr[19] = ["", "PROPIETARIO", "", "", "TIPO", "DOCUMENTO", "", "DIRECCIÓN"];
        pArr[19][1] = val('p_nom'); pArr[19][4] = val('p_tipo'); pArr[19][5] = val('p_nit'); pArr[19][7] = val('p_dir');
        pArr[20] = ["", val('p_tel'), "", "", val('p_mail')];
        pArr[24] = ["", "EMPRESA 1", "", "", "EMPRESA 2", "", "", "PERSONAL"];
        pArr[24][1] = val('r_e1'); pArr[24][4] = val('r_e2'); pArr[24][7] = val('r_per');
        pArr[25][1] = val('r_t1'); pArr[25][4] = val('r_t2'); pArr[25][7] = val('r_tp');
        const ws = XLSX.utils.aoa_to_sheet(pArr);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Ficha");
        XLSX.writeFile(wb, val('v_placa') ? `Ficha_${val('v_placa')}.xlsx` : "Plantilla.xlsx");
    }
</script>
</body>
</html>
