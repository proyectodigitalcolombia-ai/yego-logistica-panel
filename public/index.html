<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .section-header { background: var(--yego-blue); color: white; padding: 10px; margin-top: 20px; font-weight: bold; border-left: 5px solid var(--yego-green); text-transform: uppercase; }
        .card-body { background: white; border: 1px solid #ddd; padding: 15px; border-top: none; }
        label { font-weight: bold; font-size: 0.75rem; color: #555; display: block; margin-top: 8px; }
        .vencido { background-color: #ffdce0 !important; border: 2px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .table-danger { background-color: #f8d7da !important; }
        .table-warning { background-color: #fff3cd !important; }
    </style>
</head>
<body>

<nav class="navbar bg-dark text-white p-2">
    <div class="container-fluid d-flex justify-content-between">
        <span class="fw-bold">YEGO LOGÍSTICA - GESTIÓN DE SEGURIDAD</span>
        <div>
            <button class="btn btn-success btn-sm fw-bold me-2" onclick="document.getElementById('f').click()">📥 IMPORTAR EXCEL</button>
            <button class="btn btn-light btn-sm fw-bold" onclick="location.reload()">🆕 NUEVO</button>
            <input type="file" id="f" style="display:none" onchange="importar()">
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row g-2 mb-4 bg-white p-3 shadow-sm border">
        <div class="col-md-7"><input type="text" id="q" class="form-control form-control-lg" placeholder="Buscar Placa o Cédula..."></div>
        <div class="col-md-2"><button class="btn btn-primary btn-lg w-100" onclick="consultar()">BUSCAR</button></div>
        <div class="col-md-3"><button class="btn btn-warning btn-lg w-100 fw-bold" onclick="guardar()">GUARDAR CAMBIOS</button></div>
    </div>

    <form id="formYego">
        <div class="section-header">I. INFORMACIÓN TÉCNICA Y GPS</div>
        <div class="card-body row g-2">
            <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control"></div>
            <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
            <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
            <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
            <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
            <div class="col-md-3"><label>PROVEEDOR GPS</label><input type="text" id="v_gps_co" class="form-control border-primary"></div>
            <div class="col-md-3"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
            <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
            <div class="col-md-3"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control"></div>
            <div class="col-md-3"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control"></div>
            <div class="col-md-3"><label>PLACA TRAYLER</label><input type="text" id="v_trayler" class="form-control"></div>
            <div class="col-md-3"><label>CARROCERÍA</label><input type="text" id="v_carro" class="form-control"></div>
            <div class="col-md-3"><label>REPOTENCIADO</label><input type="text" id="v_repo" class="form-control"></div>
        </div>

        <div class="section-header">II. CONDUCTOR Y SEGURIDAD SOCIAL</div>
        <div class="card-body row g-2">
            <div class="col-md-4"><label>NOMBRE CONDUCTOR</label><input type="text" id="c_nom" class="form-control"></div>
            <div class="col-md-3"><label>CÉDULA</label><input type="text" id="c_cc" class="form-control"></div>
            <div class="col-md-3"><label>CELULAR</label><input type="text" id="c_cel" class="form-control border-primary"></div>
            <div class="col-md-2"><label>LICENCIA №</label><input type="text" id="c_lic" class="form-control"></div>
            <div class="col-md-3"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
            <div class="col-md-3"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
            <div class="col-md-6"><label class="text-danger">VENC. PLANILLA SEG. SOCIAL</label><input type="date" id="c_venc_planilla" class="form-control border-danger"></div>
        </div>

        <div class="section-header">III. TENEDOR Y PROPIETARIO</div>
        <div class="card-body row g-3">
            <div class="col-md-6 border-end">
                <label class="text-primary">DATOS DEL TENEDOR</label>
                <input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre"><input type="text" id="t_nit" class="form-control mb-1" placeholder="NIT"><input type="text" id="t_mail" class="form-control" placeholder="Correo">
            </div>
            <div class="col-md-6">
                <label class="text-primary">DATOS DEL PROPIETARIO</label>
                <input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre"><input type="text" id="p_nit" class="form-control mb-1" placeholder="NIT"><input type="text" id="p_mail" class="form-control" placeholder="Correo">
            </div>
        </div>

        <div class="section-header">IV. REFERENCIAS</div>
        <div class="card-body row g-2">
            <div class="col-md-4"><label>EMPRESA 1</label><input type="text" id="r_e1" class="form-control mb-1"><input type="text" id="r_t1" class="form-control"></div>
            <div class="col-md-4"><label>EMPRESA 2</label><input type="text" id="r_e2" class="form-control mb-1"><input type="text" id="r_t2" class="form-control"></div>
            <div class="col-md-4"><label>PERSONAL</label><input type="text" id="r_per" class="form-control mb-1"><input type="text" id="r_tp" class="form-control"></div>
        </div>
    </form>

    <div class="section-header mt-5">V. INVENTARIO Y CONTROL DE FLOTA</div>
    <div class="card-body p-0 shadow-sm">
        <table class="table table-sm table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th class="ps-3">PLACA</th><th>CONDUCTOR</th><th>SOAT</th><th>TECNO</th><th>PLANILLA</th><th class="text-center">ACCIONES</th>
                </tr>
            </thead>
            <tbody id="tablaVehiculos" class="fw-bold"></tbody>
        </table>
    </div>
</div>

<script>
    const val = (id) => document.getElementById(id).value;
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };

    window.onload = listar;

    function getClase(f) {
        if(!f) return "";
        const d = (new Date(f) - new Date()) / 86400000;
        return d < 0 ? "table-danger" : (d <= 15 ? "table-warning" : "");
    }

    async function listar() {
        const res = await fetch('/listar');
        const db = await res.json();
        document.getElementById('tablaVehiculos').innerHTML = db.map(v => `
            <tr>
                <td class="ps-3">${v.v.placa}</td>
                <td>${v.c.nom}</td>
                <td class="${getClase(v.v.soat)}">${v.v.soat || ''}</td>
                <td class="${getClase(v.v.tecno)}">${v.v.tecno || ''}</td>
                <td class="${getClase(v.c.venc_planilla)}">${v.c.venc_planilla || ''}</td>
                <td class="text-center">
                    <button class="btn btn-primary btn-sm" onclick="cargar('${v.v.placa}')">VER</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminar('${v.v.placa}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    async function guardar() {
        const d = {
            v: { placa: val('v_placa'), marca: val('v_marca'), modelo: val('v_modelo'), motor: val('v_motor'), chasis: val('v_chasis'), trayler: val('v_trayler'), carro: val('v_carro'), repo: val('v_repo'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass') },
            c: { nom: val('c_nom'), cc: val('c_cc'), cel: val('c_cel'), lic: val('c_lic'), eps: val('c_eps'), arl: val('c_arl'), venc_planilla: val('c_venc_planilla') },
            t: { nom: val('t_nom'), nit: val('t_nit'), mail: val('t_mail') },
            p: { nom: val('p_nom'), nit: val('p_nit'), mail: val('p_mail') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert("✅ Guardado"); listar();
    }

    async function eliminar(p) {
        const pw = prompt("Clave:");
        const res = await fetch(`/eliminar/${p}`, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({clave: pw}) });
        if(res.ok) { alert("Eliminado"); listar(); } else alert("Error");
    }

    async function consultar() {
        const res = await fetch(`/consultar/${val('q')}`);
        if(res.ok) llenar(await res.json()); else alert("No encontrado");
    }

    function llenar(d) {
        set('v_placa', d.v.placa); set('v_marca', d.v.marca); set('v_modelo', d.v.modelo); set('v_motor', d.v.motor); set('v_chasis', d.v.chasis); set('v_gps_co', d.v.gps_co); set('v_gps_user', d.v.user); set('v_gps_pass', d.v.pass); set('v_soat', d.v.soat); set('v_tecno', d.v.tecno);
        set('c_nom', d.c.nom); set('c_cc', d.c.cc); set('c_cel', d.c.cel); set('c_lic', d.c.lic); set('c_eps', d.c.eps); set('c_arl', d.c.arl); set('c_venc_planilla', d.c.venc_planilla);
        set('t_nom', d.t.nom); set('t_nit', d.t.nit); set('t_mail', d.t.mail);
        set('p_nom', d.p.nom); set('p_nit', d.p.nit); set('p_mail', d.p.mail);
        set('r_e1', d.r.e1); set('r_t1', d.r.t1); set('r_e2', d.r.e2); set('r_t2', d.r.t2); set('r_per', d.r.per); set('r_tp', d.r.tp);
    }

    async function importar() {
        const formData = new FormData();
        formData.append('archivo', document.getElementById('f').files[0]);
        const res = await fetch('/importar', { method: 'POST', body: formData });
        llenar(await res.json());
    }

    function cargar(p) { document.getElementById('q').value = p; consultar(); window.scrollTo(0,0); }
</script>
</body>
</html>
