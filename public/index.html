<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .section-header { background: var(--yego-blue); color: white; padding: 10px; margin-top: 20px; font-weight: bold; border-left: 5px solid var(--yego-green); text-transform: uppercase; }
        .card-body { background: white; border: 1px solid #ddd; padding: 15px; border-top: none; }
        label { font-weight: bold; font-size: 0.72rem; color: #555; display: block; margin-top: 8px; }
        .vencido { background-color: #ffdce0 !important; border: 2px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .btn-yego { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
    </style>
</head>
<body onload="listarTodo()">

<nav class="navbar bg-dark text-white p-2">
    <div class="container d-flex justify-content-between">
        <span>YEGO LOGÍSTICA - CONTROL DE SEGURIDAD</span>
        <div>
            <button class="btn btn-outline-light btn-sm me-2" onclick="limpiarForm()">🆕 NUEVO</button>
            <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">📥 IMPORTAR EXCEL</button>
        </div>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row g-2 mb-4 bg-white p-3 shadow-sm border">
        <div class="col-md-6"><input type="text" id="q" class="form-control form-control-lg" placeholder="Buscar Placa o Cédula..."></div>
        <div class="col-md-2"><button class="btn btn-primary btn-lg w-100" onclick="consultar()">BUSCAR</button></div>
        <div class="col-md-4"><button class="btn btn-yego btn-lg w-100 shadow" onclick="guardar()">GUARDAR / ACTUALIZAR</button></div>
    </div>

    <form id="formYego">
        <div class="section-header">I. INFORMACIÓN TÉCNICA Y GPS</div>
        <div class="card-body row g-2">
            <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control"></div>
            <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
            <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
            <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
            <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
            <div class="col-md-3"><label>PROVEEDOR GPS</label><input type="text" id="v_gps_co" class="form-control border-primary"></div>
            <div class="col-md-3"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
            <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
            <div class="col-md-3"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control"></div>
            <div class="col-md-3"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control"></div>
            <div class="col-md-3"><label>PLACA TRAYLER</label><input type="text" id="v_trayler" class="form-control"></div>
            <div class="col-md-3"><label>REPOTENCIADO</label><input type="text" id="v_repo" class="form-control"></div>
        </div>

        <div class="section-header">II. CONDUCTOR Y SEGURIDAD SOCIAL</div>
        <div class="card-body row g-2">
            <div class="col-md-4"><label>NOMBRE CONDUCTOR</label><input type="text" id="c_nom" class="form-control"></div>
            <div class="col-md-2"><label>CÉDULA</label><input type="text" id="c_cc" class="form-control"></div>
            <div class="col-md-2"><label>CELULAR</label><input type="text" id="c_cel" class="form-control border-primary"></div>
            <div class="col-md-2"><label>LICENCIA</label><input type="text" id="c_lic" class="form-control"></div>
            <div class="col-md-2"><label>VENC. LICENCIA</label><input type="date" id="c_venc_lic" class="form-control border-danger"></div>
            <div class="col-md-3"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
            <div class="col-md-3"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
            <div class="col-md-3"><label>FONDO PENSIÓN</label><input type="text" id="c_pension" class="form-control"></div>
            <div class="col-md-3"><label class="text-danger">VENC. PLANILLA</label><input type="date" id="c_venc_planilla" class="form-control border-danger"></div>
            <div class="col-md-12"><label>CORREO CONDUCTOR</label><input type="text" id="c_mail" class="form-control" placeholder="Email del Conductor"></div>
        </div>

        <div class="section-header">III. TENEDOR Y PROPIETARIO</div>
        <div class="card-body row g-3">
            <div class="col-md-6 border-end">
                <label class="text-primary fw-bold">DATOS TENEDOR</label>
                <input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre">
                <input type="text" id="t_nit" class="form-control mb-1" placeholder="NIT">
                <input type="text" id="t_tel" class="form-control mb-1" placeholder="Tel">
                <input type="text" id="t_mail" class="form-control mb-1" placeholder="Email Tenedor">
                <input type="text" id="t_dir" class="form-control" placeholder="Dirección">
            </div>
            <div class="col-md-6">
                <label class="text-primary fw-bold">DATOS PROPIETARIO</label>
                <input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre">
                <input type="text" id="p_nit" class="form-control mb-1" placeholder="NIT">
                <input type="text" id="p_tel" class="form-control mb-1" placeholder="Tel">
                <input type="text" id="p_mail" class="form-control mb-1" placeholder="Email Propietario">
                <input type="text" id="p_dir" class="form-control" placeholder="Dirección">
            </div>
        </div>

        <div class="section-header">IV. REFERENCIAS</div>
        <div class="card-body row g-2">
            <div class="col-md-4"><label>EMPRESA 1</label><input type="text" id="r_e1" class="form-control mb-1"><input type="text" id="r_t1" class="form-control"></div>
            <div class="col-md-4"><label>EMPRESA 2</label><input type="text" id="r_e2" class="form-control mb-1"><input type="text" id="r_t2" class="form-control"></div>
            <div class="col-md-4"><label>PERSONAL</label><input type="text" id="r_per" class="form-control mb-1"><input type="text" id="r_tp" class="form-control"></div>
        </div>
    </form>

    <div class="section-header mt-5">V. INVENTARIO DE FLOTA</div>
    <div class="card-body p-0 shadow-sm border">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th class="ps-3">PLACA</th><th>CONDUCTOR</th><th>SOAT</th><th>TECNO</th><th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="listaTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const val = (id) => document.getElementById(id).value;
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };

    async function listarTodo() {
        const res = await fetch('/listar');
        const db = await res.json();
        const tabla = document.getElementById('listaTabla');
        tabla.innerHTML = db.map(i => `
            <tr>
                <td class="fw-bold ps-3">${i.v.placa}</td>
                <td>${i.c.nom}</td>
                <td>${i.v.soat || '-'}</td>
                <td>${i.v.tecno || '-'}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="cargar('${i.v.placa}')">VER</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminar('${i.v.placa}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    async function eliminar(p) {
        if(confirm(`¿Borrar placa ${p}?`)) {
            await fetch(`/eliminar/${p}`, { method: 'DELETE' });
            listarTodo();
        }
    }

    async function consultar() {
        const res = await fetch(`/consultar/${val('q')}`);
        if(res.ok) llenar(await res.json()); else alert("No encontrado");
    }

    async function guardar() {
        if(!val('v_placa')) return alert("Falta Placa");
        const d = {
            v: { placa: val('v_placa').toUpperCase(), marca: val('v_marca'), modelo: val('v_modelo'), motor: val('v_motor'), chasis: val('v_chasis'), trayler: val('v_trayler'), repo: val('v_repo'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass') },
            c: { nom: val('c_nom'), cc: val('c_cc'), cel: val('c_cel'), lic: val('c_lic'), venc_lic: val('c_venc_lic'), eps: val('c_eps'), arl: val('c_arl'), pension: val('c_pension'), venc_planilla: val('c_venc_planilla'), mail: val('c_mail') },
            t: { nom: val('t_nom'), nit: val('t_nit'), tel: val('t_tel'), mail: val('t_mail'), dir: val('t_dir') },
            p: { nom: val('p_nom'), nit: val('p_nit'), tel: val('p_tel'), mail: val('p_mail'), dir: val('p_dir') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        const res = await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert((await res.json()).mensaje);
        listarTodo();
    }

    function llenar(d) {
        Object.keys(d.v).forEach(k => set('v_'+k, d.v[k]));
        Object.keys(d.c).forEach(k => set('c_'+k, d.c[k]));
        Object.keys(d.t).forEach(k => set('t_'+k, d.t[k]));
        Object.keys(d.p).forEach(k => set('p_'+k, d.p[k]));
        Object.keys(d.r).forEach(k => set('r_'+k, d.r[k]));
        
        setTimeout(() => {
            alerta('v_soat', 'SOAT'); alerta('v_tecno', 'TECNO');
            alerta('c_venc_lic', 'LICENCIA'); alerta('c_venc_planilla', 'PLANILLA');
        }, 500);
    }

    function alerta(id, label) {
        const el = document.getElementById(id); if(!el || !el.value) return;
        const diff = (new Date(el.value) - new Date()) / 86400000;
        el.classList.remove('vencido', 'por-vencer');
        if(diff < 0) el.classList.add('vencido'); else if(diff <= 10) el.classList.add('por-vencer');
    }

    function limpiarForm() { document.getElementById("formYego").reset(); document.querySelectorAll('.form-control').forEach(e => e.classList.remove('vencido', 'por-vencer')); }
    function cargar(p) { document.getElementById('q').value = p; consultar(); window.scrollTo(0,0); }
    async function importar() {
        const formData = new FormData();
        formData.append('archivo', document.getElementById('f').files[0]);
        const res = await fetch('/importar', { method: 'POST', body: formData });
        llenar(await res.json());
    }
</script>
</body>
</html>
