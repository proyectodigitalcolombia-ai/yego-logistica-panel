<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA YEGO LOGÍSTICA - GESTIÓN DE SEGURIDAD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; }
        .section-header { 
            background: var(--yego-blue); color: white; padding: 10px 15px; margin-top: 25px; 
            font-weight: 800; font-size: 0.95rem; border-left: 8px solid var(--yego-green); 
            text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .card-body { background: white; border: 1px solid #ddd; padding: 12px; border-top: none; }
        label { font-weight: bold; font-size: 0.7rem; color: #444; display: block; margin-top: 5px; }
        .vencido { background-color: #ffdce0 !important; border: 1px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 1px solid #ffc107 !important; }
        .btn-yego { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
        .box-sub { background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 4px; height: 100%; }
        .alert-item { padding: 8px; border-radius: 5px; margin-bottom: 8px; border-left: 5px solid #ccc; background: #fff; font-size: 0.75rem; }
        .alert-danger { border-left-color: #dc3545; background: #fdf2f2; }
        .alert-warning { border-left-color: #ffc107; background: #fffbeb; }
        .alert-success { border-left-color: #28a745; background: #f4faf6; }
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body onload="listarTodo()">

<nav class="navbar bg-dark text-white p-2 no-pdf">
    <div class="container d-flex justify-content-between">
        <span class="fw-bold">YEGO LOGÍSTICA - SEGURIDAD OPERATIVA</span>
        <div>
            <button class="btn btn-outline-light btn-sm me-2" onclick="limpiarForm()">🆕 NUEVO</button>
            <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">📤 IMPORTAR EXCEL</button>
        </div>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container-fluid mt-3 mb-5 px-4">
    <div class="row g-3">
        <div class="col-lg-9">
            <div class="row g-2 mb-3 bg-white p-3 shadow-sm border rounded no-pdf">
                <div class="col-md-7"><input type="text" id="q" class="form-control" placeholder="Buscar Placa o Cédula..."></div>
                <div class="col-md-2"><button class="btn btn-primary w-100 fw-bold" onclick="consultar()">BUSCAR</button></div>
                <div class="col-md-3"><button class="btn btn-yego w-100 fw-bold" onclick="guardar()">GUARDAR EN RENDER</button></div>
            </div>

            <div id="area-impresion">
                <form id="formYego">
                    <div class="section-header">I. INFORMACIÓN DEL VEHÍCULO Y GPS</div>
                    <div class="card-body row g-2">
                        <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control fw-bold text-uppercase"></div>
                        <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
                        <div class="col-md-2"><label>COLOR</label><input type="text" id="v_color" class="form-control"></div>
                        <div class="col-md-2"><label>CLASE</label><input type="text" id="v_clase" class="form-control"></div>
                        <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
                        <div class="col-md-2"><label>REPOTENCIADO</label><input type="text" id="v_repo" class="form-control"></div>
                        <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
                        <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
                        <div class="col-md-3"><label>PROVEEDOR GPS</label><input type="text" id="v_gps_co" class="form-control border-primary"></div>
                        <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
                        <div class="col-md-6"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control" onchange="alerta(this.id)"></div>
                        <div class="col-md-6"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control" onchange="alerta(this.id)"></div>
                    </div>

                    <div class="section-header">II. DATOS DEL CONDUCTOR</div>
                    <div class="card-body row g-2">
                        <div class="col-md-6"><label>NOMBRE COMPLETO</label><input type="text" id="c_nom" class="form-control"></div>
                        <div class="col-md-3"><label>CÉDULA</label><input type="text" id="c_cc" class="form-control"></div>
                        <div class="col-md-3"><label>VENC. LICENCIA</label><input type="date" id="c_venc_lic" class="form-control" onchange="alerta(this.id)"></div>
                        <div class="col-md-4"><label>CELULAR</label><input type="text" id="c_cel" class="form-control"></div>
                        <div class="col-md-4"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
                        <div class="col-md-4"><label class="text-danger">VENC. PLANILLA</label><input type="date" id="c_venc_planilla" class="form-control border-danger" onchange="alerta(this.id)"></div>
                    </div>

                    <div class="section-header">III. TENEDOR Y PROPIETARIO</div>
                    <div class="card-body row g-3">
                        <div class="col-md-6"><div class="box-sub"><label class="text-primary">TENEDOR</label><input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre"><input type="text" id="t_nit" class="form-control" placeholder="NIT/CC"></div></div>
                        <div class="col-md-6"><div class="box-sub"><label class="text-primary">PROPIETARIO</label><input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre"><input type="text" id="p_nit" class="form-control" placeholder="NIT/CC"></div></div>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-3 no-pdf">
            <div class="card bg-dark text-white p-3 mb-2 shadow"><h6>⚠️ ALERTAS</h6><small id="placa-activa">Placa: -</small></div>
            <div id="panel-vencimientos" class="p-3 border rounded bg-white shadow-sm" style="min-height: 200px;"></div>
        </div>
    </div>

    <div class="section-header mt-4 no-pdf">V. REGISTROS EN DISCO DURO</div>
    <div class="card-body p-0 border shadow-sm mt-2 no-pdf">
        <table class="table table-hover mb-0">
            <thead class="table-dark"><tr><th class="ps-3">PLACA</th><th>CONDUCTOR</th><th>VENCIMIENTOS</th><th class="text-center">ACCIONES</th></tr></thead>
            <tbody id="listaTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const val = (id) => document.getElementById(id).value;
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };

    async function listarTodo() {
        const tabla = document.getElementById('listaTabla');
        try {
            const res = await fetch('/listar');
            const db = await res.json();
            tabla.innerHTML = db.map(i => `
                <tr>
                    <td class="fw-bold ps-3">${i.v.placa}</td>
                    <td>${i.c.nom || 'S/N'}</td>
                    <td class="small">SOAT: ${i.v.soat || '-'}<br>TEC: ${i.v.tecno || '-'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-primary" onclick="cargar('${i.v.placa}')">VER</button>
                        <button id="btn-pdf-${i.v.placa}" class="btn btn-sm btn-danger" onclick="descargarDesdeDB('${i.v.placa}', 'pdf')">PDF</button>
                        <button class="btn btn-sm btn-dark" onclick="eliminar('${i.v.placa}')">🗑️</button>
                    </td>
                </tr>`).join('');
        } catch(e) { console.error(e); }
    }

    async function descargarDesdeDB(placa, tipo) {
        const b = document.getElementById(`btn-pdf-${placa}`);
        const original = b.innerHTML;
        try {
            b.innerText = "⏳...";
            const res = await fetch(`/consultar/${placa}`);
            const data = await res.json();
            llenar(data);
            
            if(tipo === 'pdf') {
                const elemento = document.getElementById('area-impresion');
                const opt = { 
                    margin: 10, filename: `YEGO_${placa}.pdf`, 
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                };
                // Promesa de descarga para evitar el congelamiento
                html2pdf().set(opt).from(elemento).save().then(() => {
                    b.innerHTML = original;
                }).catch(() => {
                    b.innerHTML = original;
                    alert("Error al generar PDF");
                });
            }
        } catch(e) { alert("Error"); b.innerHTML = original; }
    }

    async function guardar() {
        const p = val('v_placa'); if(!p) return alert("Ingrese Placa");
        const d = {
            v: { placa: p.toUpperCase(), marca: val('v_marca'), color: val('v_color'), clase: val('v_clase'), modelo: val('v_modelo'), repo: val('v_repo'), motor: val('v_motor'), chasis: val('v_chasis'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), pass: val('v_gps_pass') },
            c: { nom: val('c_nom'), cc: val('c_cc'), venc_lic: val('c_venc_lic'), cel: val('c_cel'), eps: val('c_eps'), venc_planilla: val('c_venc_planilla') },
            t: { nom: val('t_nom'), nit: val('t_nit') }, p: { nom: val('p_nom'), nit: val('p_nit') }
        };
        await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert("Guardado en Disco"); listarTodo();
    }

    function llenar(d) {
        if(d.v) Object.keys(d.v).forEach(k => set('v_'+k, d.v[k]));
        if(d.c) Object.keys(d.c).forEach(k => set('c_'+k, d.c[k]));
        if(d.t) Object.keys(d.t).forEach(k => set('t_'+k, d.t[k]));
        if(d.p) Object.keys(d.p).forEach(k => set('p_'+k, d.p[k]));
        setTimeout(() => { ['v_soat', 'v_tecno', 'c_venc_lic', 'c_venc_planilla'].forEach(alerta); }, 100);
    }

    async function consultar() {
        const q = val('q'); if(!q) return;
        const res = await fetch(`/consultar/${q}`);
        if(res.ok) { const d = await res.json(); llenar(d); actualizarDashboard(d); }
    }

    function actualizarDashboard(d) {
        document.getElementById('placa-activa').innerText = `Placa: ${d.v.placa}`;
        const panel = document.getElementById('panel-vencimientos');
        panel.innerHTML = '';
        const f = [{n:'SOAT',f:d.v.soat},{n:'TECNO',f:d.v.tecno},{n:'LICENCIA',f:d.c.venc_lic},{n:'PLANILLA',f:d.c.venc_planilla}];
        f.forEach(x => {
            if(!x.f) return;
            const diff = Math.ceil((new Date(x.f) - new Date()) / 86400000);
            const c = (diff < 0) ? 'alert-danger' : (diff <= 10) ? 'alert-warning' : 'alert-success';
            panel.innerHTML += `<div class="alert-item ${c}"><strong>${x.n}:</strong> ${x.f}</div>`;
        });
    }

    function alerta(id) {
        const e = document.getElementById(id); if(!e || !e.value) return;
        const d = (new Date(e.value) - new Date()) / 86400000;
        e.classList.remove('vencido', 'por-vencer');
        if(d < 0) e.classList.add('vencido'); else if(d <= 10) e.classList.add('por-vencer');
    }

    function limpiarForm() { document.getElementById("formYego").reset(); }
    function cargar(p) { document.getElementById('q').value = p; consultar(); }
    async function eliminar(p) {
        const cl = prompt("Clave:"); if(!cl) return;
        const res = await fetch(`/eliminar/${p}`, { method: 'DELETE', headers: {'admin-password': cl} });
        if(res.ok) { alert("Eliminado"); listarTodo(); }
    }
    async function importar() {
        const fd = new FormData(); fd.append('archivo', document.getElementById('f').files[0]);
        const res = await fetch('/importar', { method: 'POST', body: fd });
        const d = await res.json(); llenar(d); alert("Importado.");
    }
</script>
</body>
</html>
