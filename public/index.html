<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA YEGO - GESTIÓN DE SEGURIDAD VIAL</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --yego-blue: #002d5a;
            --yego-green: #27ae60;
            --yego-danger: #d32f2f;
            --yego-yellow: #fbc02d;
            --yego-light: #f8f9fa;
        }

        body {
            background-color: #f1f3f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.82rem;
            color: #2c3e50;
        }

        /* DISEÑO DE CABECERAS */
        .main-header {
            background: var(--yego-blue);
            color: white;
            padding: 20px;
            border-bottom: 5px solid var(--yego-green);
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .section-header {
            background: white;
            color: var(--yego-blue);
            padding: 12px 20px;
            margin-top: 25px;
            font-weight: 800;
            text-transform: uppercase;
            border-left: 8px solid var(--yego-green);
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-card {
            background: white;
            border: 1px solid #dee2e6;
            padding: 25px;
            border-top: none;
            border-radius: 0 0 8px 8px;
            margin-bottom: 15px;
        }

        /* FORMULARIOS */
        label {
            font-weight: 700;
            color: #546e7a;
            margin-bottom: 5px;
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
        }

        .form-control {
            border-radius: 4px;
            border: 1px solid #cfd8dc;
            padding: 10px;
            background-color: #ffffff;
            font-weight: 600;
        }

        .form-control:focus {
            border-color: var(--yego-green);
            box-shadow: 0 0 0 0.2rem rgba(39, 174, 96, 0.1);
        }

        /* SEMAFORIZACIÓN */
        .vencido {
            background-color: #ffebee !important;
            border: 2px solid var(--yego-danger) !important;
            color: var(--yego-danger) !important;
        }

        .por-vencer {
            background-color: #fffde7 !important;
            border: 2px solid var(--yego-yellow) !important;
            color: #827717 !important;
        }

        /* BOTONES */
        .btn-save {
            background-color: var(--yego-green);
            color: white;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #1e8449;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        /* TABLA LATERAL */
        .sidebar-list {
            max-height: 800px;
            overflow-y: auto;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .list-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: 0.2s;
            cursor: pointer;
        }

        .list-item:hover {
            background-color: #f1f8e9;
        }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<header class="main-header no-print">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div>
            <h2 class="m-0 fw-bold">YEGO LOGÍSTICA</h2>
            <p class="m-0 opacity-75">Panel Central de Control Operativo - Render Cloud</p>
        </div>
        <div class="text-end">
            <span class="badge bg-success">SERVIDOR NODE 20 ACTIVO</span><br>
            <small id="current-time"></small>
        </div>
    </div>
</header>

<div class="container-fluid px-4">
    <div class="row">
        
        <div class="col-lg-9">
            
            <div class="d-flex justify-content-between align-items-center mb-4 no-print bg-white p-3 rounded shadow-sm">
                <div class="w-50">
                    <input type="text" id="search-placa" class="form-control form-control-lg" placeholder="BUSCAR PLACA (Ej: POZ987)">
                </div>
                <div>
                    <button class="btn btn-primary px-4 fw-bold" onclick="consultarServidor()">CONSULTAR</button>
                    <button class="btn btn-save ms-2" onclick="guardarEnNube()">SINCRONIZAR DATOS</button>
                </div>
            </div>

            <form id="yegoForm">
                <div class="section-header">
                    <span>I. INFORMACIÓN TÉCNICA - UNIDAD DE TRACCIÓN</span>
                    <span class="text-muted small">Datos KENWORTH POZ987</span>
                </div>
                <div class="content-card">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label>Placa</label>
                            <input type="text" id="v_placa" class="form-control" value="POZ987">
                        </div>
                        <div class="col-md-3">
                            <label>Marca</label>
                            <input type="text" id="v_marca" class="form-control" value="KENWORTH">
                        </div>
                        <div class="col-md-3">
                            <label>Línea</label>
                            <input type="text" id="v_linea" class="form-control" value="T88067-77">
                        </div>
                        <div class="col-md-2">
                            <label>Modelo</label>
                            <input type="text" id="v_modelo" class="form-control" value="2026">
                        </div>
                        <div class="col-md-2">
                            <label>Color</label>
                            <input type="text" id="v_color" class="form-control" value="AZUL BLANCO">
                        </div>

                        <div class="col-md-4">
                            <label>Número de Motor</label>
                            <input type="text" id="v_motor" class="form-control" value="80726806">
                        </div>
                        <div class="col-md-4">
                            <label>Número de Chasis</label>
                            <input type="text" id="v_chasis" class="form-control" value="3WKZD40X0TF45100">
                        </div>
                        <div class="col-md-4">
                            <label>Carrocería</label>
                            <input type="text" id="v_carro" class="form-control" value="3S3">
                        </div>

                        <div class="col-md-3">
                            <label>Vencimiento SOAT</label>
                            <input type="date" id="v_soat" class="form-control" value="2026-07-03" onchange="checkSemaforo(this.id)">
                        </div>
                        <div class="col-md-3">
                            <label>Vencimiento Técnico</label>
                            <input type="date" id="v_tecno" class="form-control" value="2026-07-04" onchange="checkSemaforo(this.id)">
                        </div>
                    </div>
                </div>

                <div class="section-header">II. EQUIPO ACOPLADO (TRÁILER / REMOLQUE)</div>
                <div class="content-card">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Placa Tráiler</label>
                            <input type="text" id="v_trailer_placa" class="form-control" value="S87681">
                        </div>
                        <div class="col-md-4">
                            <label>Modelo Tráiler</label>
                            <input type="text" id="v_trailer_modelo" class="form-control" value="2024">
                        </div>
                        <div class="col-md-4">
                            <label>Configuración</label>
                            <input type="text" id="v_config" class="form-control" value="T3-S3">
                        </div>
                    </div>
                </div>

                <div class="section-header">III. SISTEMA DE MONITOREO SATELITAL</div>
                <div class="content-card">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Proveedor / URL</label>
                            <input type="text" id="v_gps_url" class="form-control" value="https://login.satrack.com">
                        </div>
                        <div class="col-md-4">
                            <label>Usuario GPS</label>
                            <input type="text" id="v_gps_user" class="form-control" value="POZ987J">
                        </div>
                        <div class="col-md-4">
                            <label>Clave GPS</label>
                            <input type="text" id="v_gps_pass" class="form-control" value="Colombia987.">
                        </div>
                    </div>
                </div>

                <div class="section-header">IV. INFORMACIÓN DEL CONDUCTOR</div>
                <div class="content-card">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label>Nombre Completo</label>
                            <input type="text" id="c_nom" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label>Cédula</label>
                            <input type="text" id="c_cc" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label>Celular</label>
                            <input type="text" id="c_cel" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label>Vencimiento Licencia</label>
                            <input type="date" id="c_venc_lic" class="form-control" onchange="checkSemaforo(this.id)">
                        </div>
                        <div class="col-md-4">
                            <label>Seguridad Social (EPS/ARL)</label>
                            <input type="text" id="c_ss" class="form-control">
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="col-lg-3 no-print">
            <div class="sidebar-list">
                <div class="bg-dark text-white p-3 fw-bold rounded-top">
                    HISTORIAL EN NUBE
                </div>
                <div id="lista-render" class="p-2">
                    </div>
            </div>
            
            <div class="mt-4 p-3 bg-white border rounded shadow-sm">
                <h6 class="fw-bold border-bottom pb-2">RESUMEN DE ESTADO</h6>
                <div id="stats-panel" class="small">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * LÓGICA DEL CLIENTE - YEGO LOGÍSTICA
     */
    
    // 1. Inicialización
    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        actualizarLista();
        
        // Ejecutar semáforo inicial para los datos de POZ987
        ['v_soat', 'v_tecno'].forEach(checkSemaforo);
    };

    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleString();
    }

    // 2. Funciones de Semaforización
    function checkSemaforo(id) {
        const el = document.getElementById(id);
        if(!el.value) return;

        const hoy = new Date();
        const fechaDoc = new Date(el.value);
        const diff = (fechaDoc - hoy) / (1000 * 60 * 60 * 24);

        el.classList.remove('vencido', 'por-vencer');

        if(diff < 0) {
            el.classList.add('vencido');
        } else if(diff <= 15) {
            el.classList.add('por-vencer');
        }
    }

    // 3. Comunicación con el Servidor Render
    async function guardarEnNube() {
        const payload = {
            v: {
                placa: document.getElementById('v_placa').value.toUpperCase(),
                marca: document.getElementById('v_marca').value,
                modelo: document.getElementById('v_modelo').value,
                soat: document.getElementById('v_soat').value,
                tecno: document.getElementById('v_tecno').value,
                gps_user: document.getElementById('v_gps_user').value
            },
            c: {
                nom: document.getElementById('c_nom').value,
                cc: document.getElementById('c_cc').value
            }
        };

        try {
            const res = await fetch('/guardar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert("✓ " + data.mensaje);
            actualizarLista();
        } catch (e) {
            alert("Error conectando con Render.");
        }
    }

    async function actualizarLista() {
        try {
            const res = await fetch('/listar');
            const data = await res.json();
            const container = document.getElementById('lista-render');
            
            if(data.length === 0) {
                container.innerHTML = '<p class="text-center p-4 text-muted">Sin registros.</p>';
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="list-item" onclick="cargarRegistro('${item.v.placa}')">
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold text-primary">${item.v.placa}</span>
                        <span class="badge bg-light text-dark border">${item.v.modelo}</span>
                    </div>
                    <div class="text-muted small">SOAT: ${item.v.soat}</div>
                </div>
            `).join('');
            
            document.getElementById('stats-panel').innerHTML = `
                <div class="d-flex justify-content-between"><span>Registros:</span> <b>${data.length}</b></div>
            `;

        } catch (e) {
            console.error("Error al listar registros.");
        }
    }

    async function consultarServidor() {
        const placa = document.getElementById('search-placa').value.toUpperCase();
        if(!placa) return;

        try {
            const res = await fetch(`/consultar/${placa}`);
            if(res.ok) {
                const data = await res.json();
                alert("Registro encontrado.");
                // Aquí podrías llenar el formulario completo
            } else {
                alert("Placa no encontrada.");
            }
        } catch (e) {
            console.error(e);
        }
    }

    function cargarRegistro(placa) {
        document.getElementById('search-placa').value = placa;
        consultarServidor();
    }
</script>

</body>
</html>
