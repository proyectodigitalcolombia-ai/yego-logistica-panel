<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA YEGO - GESTIÓN POZ987</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f0f2f5; font-family: sans-serif; font-size: 0.8rem; }
        .header { background: var(--yego-blue); color: white; padding: 20px; border-bottom: 5px solid var(--yego-green); }
        .main-card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #ddd; }
        .side-panel { background: white; border-radius: 8px; border: 1px solid #ddd; height: 100%; min-height: 500px; }
        .db-title { background: #333; color: white; padding: 10px; font-weight: bold; border-radius: 8px 8px 0 0; }
        .placa-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .placa-item:hover { background: #e8f5e9; border-left: 5px solid var(--yego-green); }
        .vencido { background: #f8d7da !important; color: #721c24 !important; border: 1px solid #f5c6cb !important; }
        label { font-weight: bold; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        .btn-save { background: var(--yego-green); color: white; font-weight: bold; border: none; padding: 10px 30px; }
    </style>
</head>
<body onload="arrancarSistema()">

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h2 class="m-0">YEGO LOGÍSTICA</h2>
        <small>Control de Flota - Placa POZ987</small>
    </div>
    <div id="status">CONECTADO A RENDER</div>
</div>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-9">
            <div class="main-card shadow-sm">
                <div class="row g-3 mb-4">
                    <div class="col-md-8">
                        <input type="text" id="busqueda" class="form-control" placeholder="Buscar placa...">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="buscarUnidad()">CONSULTAR</button>
                    </div>
                </div>

                <form id="formUnidad">
                    <h6 class="text-primary fw-bold border-bottom pb-2">DATOS TÉCNICOS</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2">
                            <label>Placa</label>
                            <input type="text" id="v_placa" class="form-control" value="POZ987">
                        </div>
                        <div class="col-md-4">
                            <label>Marca / Línea</label>
                            <input type="text" id="v_marca" class="form-control" value="KENWORTH T880">
                        </div>
                        <div class="col-md-3">
                            <label>Vencimiento SOAT</label>
                            <input type="date" id="v_soat" class="form-control" onchange="validarSemaforo(this.id)">
                        </div>
                        <div class="col-md-3">
                            <label>Vencimiento Tecno</label>
                            <input type="date" id="v_tecno" class="form-control" onchange="validarSemaforo(this.id)">
                        </div>
                    </div>

                    <h6 class="text-primary fw-bold border-bottom pb-2">CONDUCTOR ASIGNADO</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label>Nombre Completo</label>
                            <input type="text" id="c_nom" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label>Cédula</label>
                            <input type="text" id="c_cc" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label>Celular</label>
                            <input type="text" id="c_cel" class="form-control">
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="button" class="btn btn-save btn-lg" onclick="guardarEnRender()">SINCRONIZAR CON BASE DE DATOS</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-3">
            <div class="side-panel shadow-sm">
                <div class="db-title d-flex justify-content-between">
                    <span>PLACAS EN NUBE</span>
                    <span id="contador" class="badge bg-success">0</span>
                </div>
                <div id="listaPlacas">
                    <div class="p-4 text-center text-muted">Cargando...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Función que se ejecuta al abrir la página
    async function arrancarSistema() {
        console.log("Iniciando...");
        await cargarLista();
    }

    // TRAER LA LISTA DE RENDER
    async function cargarLista() {
        try {
            const respuesta = await fetch('/listar');
            const placas = await respuesta.json();
            
            const contenedor = document.getElementById('listaPlacas');
            document.getElementById('contador').innerText = placas.length;

            if (placas.length === 0) {
                contenedor.innerHTML = '<div class="p-4 text-center text-muted small">No hay placas guardadas aún.</div>';
                return;
            }

            contenedor.innerHTML = placas.map(item => `
                <div class="placa-item" onclick="seleccionarPlaca('${item.v.placa}')">
                    <strong>${item.v.placa}</strong><br>
                    <small class="text-muted">${item.v.marca} - ${item.c.nom || 'S.N'}</small>
                </div>
            `).join('');

        } catch (error) {
            console.error("Error al obtener placas:", error);
            document.getElementById('listaPlacas').innerHTML = '<div class="p-2 text-danger">Error de conexión.</div>';
        }
    }

    // GUARDAR NUEVA PLACA
    async function guardarEnRender() {
        const payload = {
            v: {
                placa: document.getElementById('v_placa').value.toUpperCase(),
                marca: document.getElementById('v_marca').value,
                soat: document.getElementById('v_soat').value,
                tecno: document.getElementById('v_tecno').value
            },
            c: {
                nom: document.getElementById('c_nom').value,
                cc: document.getElementById('c_cc').value,
                cel: document.getElementById('c_cel').value
            }
        };

        try {
            const res = await fetch('/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert("✓ " + data.mensaje);
            await cargarLista(); // Recarga la columna derecha
        } catch (e) {
            alert("Error al guardar");
        }
    }

    // CARGAR DATOS AL HACER CLIC EN UNA PLACA DE LA LISTA
    async function seleccionarPlaca(placa) {
        try {
            const res = await fetch(`/consultar/${placa}`);
            const data = await res.json();
            
            document.getElementById('v_placa').value = data.v.placa;
            document.getElementById('v_marca').value = data.v.marca;
            document.getElementById('v_soat').value = data.v.soat;
            document.getElementById('v_tecno').value = data.v.tecno;
            document.getElementById('c_nom').value = data.c.nom;
            document.getElementById('c_cc').value = data.c.cc;
            document.getElementById('c_cel').value = data.c.cel;

            validarSemaforo('v_soat');
            validarSemaforo('v_tecno');
        } catch (e) { console.error(e); }
    }

    function validarSemaforo(id) {
        const input = document.getElementById(id);
        if (!input.value) return;
        const diff = (new Date(input.value) - new Date()) / 86400000;
        input.classList.toggle('vencido', diff < 0);
    }

    function buscarUnidad() {
        const p = document.getElementById('busqueda').value.toUpperCase();
        if(p) seleccionarPlaca(p);
    }
</script>

</body>
</html>
