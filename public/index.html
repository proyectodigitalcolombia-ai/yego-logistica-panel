<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YEGO LOGÍSTICA - Gestión de Flota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-sky: #00a8e8; --yego-green: #27ae60; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--yego-blue); color: white; padding: 1rem; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: -30px; }
        .nav-tabs { border: none; background: #eee; border-radius: 10px 10px 0 0; }
        .nav-tabs .nav-link { border: none; color: #666; font-weight: 500; padding: 12px 20px; }
        .nav-tabs .nav-link.active { background: white; color: var(--yego-blue); border-radius: 10px 10px 0 0; border-bottom: 3px solid var(--yego-sky); }
        .section-header { color: var(--yego-blue); font-weight: bold; border-left: 4px solid var(--yego-sky); padding-left: 10px; margin-bottom: 20px; }
        .form-label { font-size: 0.85rem; font-weight: 600; color: #555; }
        .btn-upload { background: var(--yego-green); color: white; border-radius: 25px; transition: 0.3s; }
        .btn-go { background: var(--yego-blue); color: white; padding: 12px 40px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand text-white"><i class="fas fa-truck-moving"></i> <b>YEGO</b> LOGÍSTICA</span>
        <div>
            <input type="file" id="excelFile" style="display:none" onchange="subirExcel()">
            <button class="btn btn-upload shadow-sm" onclick="document.getElementById('excelFile').click()">
                <i class="fas fa-file-excel"></i> IMPORTAR EXCEL
            </button>
        </div>
    </div>
</nav>

<div style="height: 100px; background: var(--yego-blue);"></div>

<div class="container mb-5">
    <div class="card">
        <div class="card-body p-0">
            <ul class="nav nav-tabs" id="fleetTab" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-vehiculo">I. Vehículo</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-conductor">II. Conductor</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-terceros">III. Tenedor / Prop.</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-seguridad">IV. Seguridad & GPS</button></li>
            </ul>

                        <div class="col-md-3"><label class="form-label">Línea</label><input type="text" id="linea" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Modelo</label><input type="number" id="modelo" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Color</label><input type="text" id="color" class="form-control"></div>
