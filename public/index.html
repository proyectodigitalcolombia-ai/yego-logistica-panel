<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--yego-blue); color: white; border-bottom: 4px solid var(--yego-green); }
        .section-header { background: #eee; font-weight: bold; padding: 5px; border: 1px solid #ccc; margin-top: 20px; text-transform: uppercase; font-size: 0.8rem; }
        .form-control { border-radius: 0; font-size: 0.85rem; }
        .form-label { font-size: 0.7rem; font-weight: bold; margin-bottom: 0; color: #555; }
    </style>
</head>
<body>

<nav class="navbar p-3 shadow-sm text-center">
    <div class="container d-flex justify-content-between">
        <span class="h4">YEGO LOGÍSTICA</span>
        <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">IMPORTAR EXCEL</button>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="bg-white p-4 shadow-sm rounded border">
        <div class="row g-2 mb-4">
            <div class="col-md-8"><input type="text" id="q" class="form-control form-control-lg" placeholder="Ingrese Placa o Cédula..."></div>
            <div class="col-md-2"><button class="btn btn-primary btn-lg w-100 fw-bold" onclick="consultar()">CONSULTAR</button></div>
            <div class="col-md-2"><button class="btn btn-warning btn-lg w-100 fw-bold" onclick="guardar()">CREAR / ACTUALIZAR</button></div>
        </div>

        <form id="formYego">
            <div class="section-header">I. INFORMACIÓN DEL VEHÍCULO</div>
            <div class="row g-2 mt-1">
                <div class="col-md-4"><label class="form-label">Placa</label><input type="text" id="placa" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Marca</label><input type="text" id="marca" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Color</label><input type="text" id="color" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Clase de Vehículo</label><input type="text" id="clase" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Modelo</label><input type="text" id="modelo" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Línea</label><input type="text" id="linea" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">GPS Compañía</label><input type="text" id="gps_co" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Usuario GPS</label><input type="text" id="gps_user" class="form-control fw-bold text-primary"></div>
                <div class="col-md-4"><label class="form-label">Clave GPS</label><input type="text" id="gps_pass" class="form-control fw-bold text-primary"></div>
            </div>

            <div class="section-header">II. INFORMACIÓN DEL CONDUCTOR</div>
            <div class="row g-2 mt-1">
                <div class="col-md-6"><label class="form-label">Nombre del Conductor</label><input type="text" id="c_nom" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Cédula (CC)</label><input type="text" id="c_cc" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Celular</label><input type="text" id="c_cel" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Dirección Vivienda</label><input type="text" id="c_dir" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">EPS</label><input type="text" id="c_eps" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">ARL</label><input type="text" id="c_arl" class="form-control"></div>
            </div>

            <div class="section-header">III. TENEDOR / PROPIETARIO</div>
            <div class="row g-2 mt-1">
                <div class="col-md-6"><label class="form-label">Nombre Tenedor</label><input type="text" id="t_nom" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">NIT/CC Tenedor</label><input type="text" id="t_nit" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Nombre Propietario</label><input type="text" id="p_nom" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">NIT/CC Propietario</label><input type="text" id="p_nit" class="form-control"></div>
            </div>

            <div class="section-header">IV. REFERENCIAS</div>
            <div class="row g-2 mt-1">
                <div class="col-md-4"><label class="form-label">Empresa 1</label><input type="text" id="r_e1" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Empresa 2</label><input type="text" id="r_e2" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Nombre Ref Personal</label><input type="text" id="r_per" class="form-control"></div>
            </div>
        </form>
    </div>
</div>

<script>
    async function importar() {
        const file = document.getElementById('f').files[0];
        if(!file) return;
        const formData = new FormData();
        formData.append('archivo', file);
        const res = await fetch('/importar', { method: 'POST', body: formData });
        llenar(await res.json());
        alert("✅ Información del Excel cargada. Pulsa CREAR/ACTUALIZAR para guardar.");
    }

    async function consultar() {
        const q = document.getElementById('q').value;
        if(!q) return alert("Ingresa placa o cédula");
        const res = await fetch(`/consultar/${q}`);
        if(res.ok) {
            llenar(await res.json());
            alert("✅ Registro encontrado.");
        } else {
            alert("❌ No se encontró información.");
        }
    }

    async function guardar() {
        const d = {
            v: { 
                placa: val('placa'), marca: val('marca'), color: val('color'), 
                clase: val('clase'), modelo: val('modelo'), linea: val('linea'),
                gps_co: val('gps_co'), user: val('gps_user'), pass: val('gps_pass') 
            },
            c: { nom: val('c_nom'), cc: val('c_cc'), cel: val('c_cel'), dir: val('c_dir'), eps: val('c_eps'), arl: val('c_arl') },
            t: { nom: val('t_nom'), nit: val('t_nit') },
            p: { nom: val('p_nom'), nit: val('p_nit') },
            r: { e1: val('r_e1'), e2: val('r_e2'), per: val('r_per') }
        };
        if(!d.v.placa) return alert("La placa es obligatoria");
        const res = await fetch('/guardar', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(d) 
        });
        const r = await res.json();
        alert(r.mensaje);
    }

    function llenar(d) {
        // VEHICULO
        document.getElementById('placa').value = d.v.placa || '';
        document.getElementById('marca').value = d.v.marca || '';
        document.getElementById('color').value = d.v.color || '';
        document.getElementById('clase').value = d.v.clase || '';
        document.getElementById('modelo').value = d.v.modelo || '';
        document.getElementById('linea').value = d.v.linea || '';
        document.getElementById('gps_co').value = d.v.gps_co || '';
        document.getElementById('gps_user').value = d.v.user || '';
        document.getElementById('gps_pass').value = d.v.pass || '';
        
        // CONDUCTOR
        document.getElementById('c_nom').value = d.c.nom || '';
        document.getElementById('c_cc').value = d.c.cc || '';
        document.getElementById('c_cel').value = d.c.cel || '';
        document.getElementById('c_dir').value = d.c.dir || '';
        document.getElementById('c_eps').value = d.c.eps || '';
        document.getElementById('c_arl').value = d.c.arl || '';

        // TENEDOR / PROPIETARIO
        document.getElementById('t_nom').value = d.t.nom || '';
        document.getElementById('t_nit').value = d.t.nit || '';
        document.getElementById('p_nom').value = d.p.nom || '';
        document.getElementById('p_nit').value = d.p.nit || '';

        // REFERENCIAS
        document.getElementById('r_e1').value = d.r.e1 || '';
        document.getElementById('r_e2').value = d.r.e2 || '';
        document.getElementById('r_per').value = d.r.per || '';
    }

    function val(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
