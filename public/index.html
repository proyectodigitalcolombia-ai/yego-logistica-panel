<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA YEGO LOGÍSTICA - GESTIÓN DE SEGURIDAD</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; --yego-yellow: #ffc107; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; color: #333; }
        
        /* Ajuste para que el PDF no se corte */
        .section-header { 
            background: var(--yego-blue); color: white; padding: 10px 15px; margin-top: 15px; 
            font-weight: 800; font-size: 0.90rem; border-left: 6px solid var(--yego-green); 
            text-transform: uppercase;
        }
        .card-body { background: white; border: 1px solid #ddd; padding: 12px; border-top: none; }
        label { font-weight: bold; font-size: 0.70rem; color: #555; display: block; margin-top: 4px; text-transform: uppercase; }
        
        .vencido { background-color: #ffdce0 !important; border: 1px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 1px solid #ffc107 !important; }
        
        .box-sub { background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 4px; height: 100%; }
        
        /* Evita el error "Unsupported image type" eliminando iconos conflictivos del área de captura */
        .btn-gestion { font-size: 0.75rem; font-weight: bold; }
        
        @media print { .no-pdf { display: none !important; } #area-pdf { width: 100%; } }
    </style>
</head>
<body onload="listarTodo()">

<nav class="navbar navbar-expand-lg bg-dark text-white p-2 no-pdf">
    <div class="container-fluid d-flex justify-content-between">
        <span class="fw-bold">YEGO LOGÍSTICA - SEGURIDAD OPERATIVA (NODE 20)</span>
        <div class="d-flex">
            <button class="btn btn-outline-light btn-sm me-2" onclick="limpiarForm()">NUEVO</button>
            <button class="btn btn-success btn-sm" onclick="document.getElementById('f').click()">EXCEL</button>
        </div>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container-fluid mt-3 mb-5 px-3">
    <div class="row g-3">
        <div class="col-lg-9">
            <div class="row g-2 mb-3 no-pdf align-items-end">
                <div class="col-md-7"><input type="text" id="q" class="form-control" placeholder="Placa o Cédula..."></div>
                <div class="col-md-2"><button class="btn btn-primary w-100 fw-bold" onclick="consultar()">BUSCAR</button></div>
                <div class="col-md-3"><button class="btn btn-warning w-100 fw-bold" onclick="guardar()">GUARDAR EN RENDER</button></div>
            </div>

            <div id="area-pdf" class="bg-white p-2">
                <form id="formYego">
                    <div class="section-header">I. INFORMACIÓN TÉCNICA DEL VEHÍCULO Y GPS</div>
                    <div class="card-body row g-2">
                        <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control fw-bold"></div>
                        <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
                        <div class="col-md-2"><label>COLOR</label><input type="text" id="v_color" class="form-control"></div>
                        <div class="col-md-2"><label>CLASE</label><input type="text" id="v_clase" class="form-control"></div>
                        <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
                        <div class="col-md-2"><label>REPOTENCIADO</label><input type="text" id="v_repo" class="form-control"></div>
                        
                        <div class="col-md-3"><label>LÍNEA</label><input type="text" id="v_linea" class="form-control"></div>
                        <div class="col-md-3"><label>MOTOR</label><input type="text" id="v_motor" class="form-control"></div>
                        <div class="col-md-3"><label>CHASIS</label><input type="text" id="v_chasis" class="form-control"></div>
                        <div class="col-md-3"><label>CARROCERÍA</label><input type="text" id="v_carro" class="form-control"></div>
                        
                        <div class="col-md-3"><label>CIUDAD REGISTRO</label><input type="text" id="v_ciudad" class="form-control"></div>
                        <div class="col-md-3"><label>COMBUSTIBLE</label><input type="text" id="v_combust" class="form-control"></div>
                        <div class="col-md-3"><label>NIVEL COMB.</label><input type="text" id="v_nivel" class="form-control"></div>
                        <div class="col-md-3"><label>PLACA TRAILER</label><input type="text" id="v_trayler" class="form-control"></div>
                        
                        <div class="col-md-4"><label>PROVEEDOR GPS</label><input type="text" id="v_gps_co" class="form-control"></div>
                        <div class="col-md-4"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
                        <div class="col-md-4"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
                        
                        <div class="col-md-4"><label>MODELO TRAILER</label><input type="text" id="v_m_trailer" class="form-control"></div>
                        <div class="col-md-4"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control" onchange="alerta(this.id)"></div>
                        <div class="col-md-4"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control" onchange="alerta(this.id)"></div>
                    </div>

                    <div class="section-header">II. DATOS DEL CONDUCTOR Y SEGURIDAD SOCIAL</div>
                    <div class="card-body row g-2">
                        <div class="col-md-5"><label>NOMBRE COMPLETO</label><input type="text" id="c_nom" class="form-control"></div>
                        <div class="col-md-4"><label>DOCUMENTO (CC)</label><input type="text" id="c_cc" class="form-control"></div>
                        <div class="col-md-3"><label>CIUDAD</label><input type="text" id="c_ciudad" class="form-control"></div>
                        
                        <div class="col-md-3"><label>LICENCIA NRO</label><input type="text" id="c_lic" class="form-control"></div>
                        <div class="col-md-2"><label>CATEGORÍA</label><input type="text" id="c_cat" class="form-control"></div>
                        <div class="col-md-3"><label>VENC. LICENCIA</label><input type="date" id="c_venc_lic" class="form-control" onchange="alerta(this.id)"></div>
                        <div class="col-md-4"><label>CELULAR</label><input type="text" id="c_cel" class="form-control"></div>
                        
                        <div class="col-md-3"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
                        <div class="col-md-3"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
                        <div class="col-md-3"><label class="text-danger">VENC. PLANILLA</label><input type="date" id="c_venc_planilla" class="form-control border-danger" onchange="alerta(this.id)"></div>
                        <div class="col-md-3"><label>CORREO</label><input type="text" id="c_mail" class="form-control"></div>
                        <div class="col-md-12"><label>DIRECCIÓN RESIDENCIA</label><input type="text" id="c_dir" class="form-control"></div>
                    </div>

                    <div class="section-header">III. TENEDOR Y PROPIETARIO</div>
                    <div class="card-body row g-2">
                        <div class="col-md-6">
                            <div class="box-sub">
                                <label class="text-primary">DATOS DEL TENEDOR</label>
                                <input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre">
                                <input type="text" id="t_nit" class="form-control" placeholder="NIT/CC">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="box-sub">
                                <label class="text-primary">DATOS DEL PROPIETARIO</label>
                                <input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre">
                                <input type="text" id="p_nit" class="form-control" placeholder="NIT/CC">
                            </div>
                        </div>
                    </div>

                    <div class="section-header">IV. REFERENCIAS Y EMERGENCIA</div>
                    <div class="card-body row g-2">
                        <div class="col-md-4"><label>REF LABORAL 1</label><input type="text" id="r_e1" class="form-control mb-1" placeholder="Empresa"><input type="text" id="r_t1" class="form-control" placeholder="Teléfono"></div>
                        <div class="col-md-4"><label>REF LABORAL 2</label><input type="text" id="r_e2" class="form-control mb-1" placeholder="Empresa"><input type="text" id="r_t2" class="form-control" placeholder="Teléfono"></div>
                        <div class="col-md-4"><label>REF PERSONAL</label><input type="text" id="r_per" class="form-control mb-1" placeholder="Nombre"><input type="text" id="r_tp" class="form-control" placeholder="Teléfono"></div>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-3 no-pdf">
            <div class="card bg-dark text-white p-3 mb-2"><h6>ALERTAS</h6><small id="placa-activa">Placa: -</small></div>
            <div id="panel-vencimientos" class="p-2 border rounded bg-white shadow-sm"></div>
        </div>
    </div>

    <div class="section-header mt-4 no-pdf">REGISTROS EN DISCO</div>
    <div class="card-body p-0 border no-pdf">
        <table class="table table-sm table-hover mb-0">
            <thead class="table-dark"><tr><th class="ps-3">PLACA</th><th>CONDUCTOR</th><th>GESTIÓN</th></tr></thead>
            <tbody id="listaTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const val = (id) => document.getElementById(id).value;
    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v || ''; };

    async function listarTodo() {
        const t = document.getElementById('listaTabla');
        try {
            const res = await fetch('/listar');
            const db = await res.json();
            t.innerHTML = db.map(i => `
                <tr>
                    <td class="fw-bold ps-3">${i.v.placa}</td>
                    <td>${i.c.nom || 'S/N'}</td>
                    <td>
                        <button class="btn btn-primary btn-sm btn-gestion" onclick="cargar('${i.v.placa}')">VER</button>
                        <button id="btn-pdf-${i.v.placa}" class="btn btn-danger btn-sm btn-gestion" onclick="descargarDesdeDB('${i.v.placa}')">PDF</button>
                    </td>
                </tr>`).join('');
        } catch(e) { console.error(e); }
    }

    async function descargarDesdeDB(placa) {
        const b = document.getElementById(`btn-pdf-${placa}`);
        try {
            b.innerText = "...";
            const res = await fetch(`/consultar/${placa}`);
            const data = await res.json();
            llenar(data);
            const opt = { 
                margin: 5, filename: `FICHA_${placa}.pdf`, 
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            html2pdf().set(opt).from(document.getElementById('area-pdf')).save().then(() => b.innerText = "PDF");
        } catch(e) { b.innerText = "ERR"; alert("Error: Unsupported image type"); }
    }

    async function guardar() {
        if(!val('v_placa')) return alert("Falta Placa");
        const d = {
            v: { placa: val('v_placa').toUpperCase(), marca: val('v_marca'), color: val('v_color'), clase: val('v_clase'), modelo: val('v_modelo'), repo: val('v_repo'), linea: val('v_linea'), motor: val('v_motor'), chasis: val('v_chasis'), carro: val('v_carro'), ciudad: val('v_ciudad'), combust: val('v_combust'), nivel: val('v_nivel'), trayler: val('v_trayler'), m_trailer: val('v_m_trailer'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass') },
            c: { nom: val('c_nom'), cc: val('c_cc'), ciudad: val('c_ciudad'), lic: val('c_lic'), cat: val('c_cat'), venc_lic: val('c_venc_lic'), cel: val('c_cel'), eps: val('c_eps'), arl: val('c_arl'), venc_planilla: val('c_venc_planilla'), mail: val('c_mail'), dir: val('c_dir') },
            t: { nom: val('t_nom'), nit: val('t_nit') }, p: { nom: val('p_nom'), nit: val('p_nit') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert("Guardado"); listarTodo();
    }

    function llenar(d) {
        if(d.v) Object.keys(d.v).forEach(k => set(k==='user'?'v_gps_user':k==='pass'?'v_gps_pass':'v_'+k, d.v[k]));
        if(d.c) Object.keys(d.c).forEach(k => set('c_'+k, d.c[k]));
        if(d.t) Object.keys(d.t).forEach(k => set('t_'+k, d.t[k]));
        if(d.p) Object.keys(d.p).forEach(k => set('p_'+k, d.p[k]));
        if(d.r) Object.keys(d.r).forEach(k => set('r_'+k, d.r[k]));
        setTimeout(() => { ['v_soat', 'v_tecno', 'c_venc_lic', 'c_venc_planilla'].forEach(alerta); }, 150);
    }

    async function consultar() {
        const q = val('q'); if(!q) return;
        const res = await fetch(`/consultar/${q}`);
        if(res.ok) { const d = await
