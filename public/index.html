<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YEGO LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --yego-blue: #002d5a; --yego-green: #27ae60; }
        body { background: #f4f7f6; font-family: sans-serif; font-size: 0.9rem; }
        .section-header { background: var(--yego-blue); color: white; font-weight: bold; padding: 8px; margin-top: 20px; border-left: 5px solid var(--yego-green); text-transform: uppercase; font-size: 0.75rem; }
        .form-control { border-radius: 0; font-size: 0.8rem; }
        .vencido { background-color: #ffdce0 !important; border: 1px solid #dc3545 !important; }
        .por-vencer { background-color: #fff3cd !important; border: 1px solid #ffc107 !important; }
        label { font-weight: 700; color: #555; font-size: 0.7rem; margin-bottom: 2px; display: block; }
    </style>
</head>
<body>

<nav class="navbar bg-dark text-white p-2 mb-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h6 class="mb-0">YEGO LOGÍSTICA - GESTIÓN DE SEGURIDAD</h6>
        <button class="btn btn-success btn-sm fw-bold" onclick="document.getElementById('f').click()">IMPORTAR EXCEL</button>
        <input type="file" id="f" style="display:none" onchange="importar()">
    </div>
</nav>

<div class="container mb-5">
    <div class="bg-white p-4 shadow-sm border rounded">
        <div class="row g-2 mb-4">
            <div class="col-md-7"><input type="text" id="q" class="form-control form-control-lg" placeholder="Placa o Cédula..."></div>
            <div class="col-md-2"><button class="btn btn-primary btn-lg w-100 fw-bold" onclick="consultar()">BUSCAR</button></div>
            <div class="col-md-3"><button class="btn btn-warning btn-lg w-100 fw-bold" onclick="guardar()">CREAR / ACTUALIZAR</button></div>
        </div>

        <form id="formYego">
            <div class="section-header">I. INFORMACIÓN DEL VEHÍCULO</div>
            <div class="row g-2 mt-1">
                <div class="col-md-2"><label>PLACA</label><input type="text" id="v_placa" class="form-control"></div>
                <div class="col-md-2"><label>MARCA</label><input type="text" id="v_marca" class="form-control"></div>
                <div class="col-md-2"><label>MODELO</label><input type="text" id="v_modelo" class="form-control"></div>
                <div class="col-md-3"><label>VENC. SOAT</label><input type="date" id="v_soat" class="form-control"></div>
                <div class="col-md-3"><label>VENC. TECNO</label><input type="date" id="v_tecno" class="form-control"></div>
                <div class="col-md-3"><label>GPS EMPRESA</label><input type="text" id="v_gps_co" class="form-control"></div>
                <div class="col-md-3"><label>USUARIO GPS</label><input type="text" id="v_gps_user" class="form-control"></div>
                <div class="col-md-3"><label>CLAVE GPS</label><input type="text" id="v_gps_pass" class="form-control"></div>
            </div>

            <div class="section-header">II. INFORMACIÓN DEL CONDUCTOR Y SEGURIDAD SOCIAL</div>
            <div class="row g-2 mt-1">
                <div class="col-md-4"><label>NOMBRE COMPLETO</label><input type="text" id="c_nom" class="form-control"></div>
                <div class="col-md-4"><label>CÉDULA</label><input type="text" id="c_cc" class="form-control"></div>
                <div class="col-md-4"><label>VENC. CÉDULA</label><input type="date" id="c_venc_cc" class="form-control"></div>
                
                <div class="col-md-3"><label>EPS</label><input type="text" id="c_eps" class="form-control"></div>
                <div class="col-md-3"><label>VENC. EPS (PARAFISCAL)</label><input type="date" id="c_venc_eps" class="form-control"></div>
                <div class="col-md-3"><label>ARL</label><input type="text" id="c_arl" class="form-control"></div>
                <div class="col-md-3"><label>VENC. ARL (PARAFISCAL)</label><input type="date" id="c_venc_arl" class="form-control"></div>
                
                <div class="col-md-4"><label>FONDO DE PENSIÓN</label><input type="text" id="c_pension" class="form-control"></div>
                <div class="col-md-4"><label>VENC. PLANILLA SEG. SOCIAL</label><input type="date" id="c_venc_planilla" class="form-control"></div>
                <div class="col-md-4"><label>CORREO ELECTRÓNICO</label><input type="text" id="c_mail" class="form-control"></div>
            </div>

            <div class="section-header">III. TENEDOR / PROPIETARIO</div>
            <div class="row g-2 mt-1">
                <div class="col-md-6">
                    <label>TENEDOR</label><input type="text" id="t_nom" class="form-control mb-1" placeholder="Nombre">
                    <input type="text" id="t_nit" class="form-control mb-1" placeholder="Cédula/NIT">
                    <input type="text" id="t_tel" class="form-control mb-1" placeholder="Teléfono">
                    <input type="text" id="t_dir" class="form-control mb-1" placeholder="Dirección">
                    <input type="text" id="t_mail" class="form-control" placeholder="Correo">
                </div>
                <div class="col-md-6">
                    <label>PROPIETARIO</label><input type="text" id="p_nom" class="form-control mb-1" placeholder="Nombre">
                    <input type="text" id="p_nit" class="form-control mb-1" placeholder="Cédula/NIT">
                    <input type="text" id="p_tel" class="form-control mb-1" placeholder="Teléfono">
                    <input type="text" id="p_dir" class="form-control mb-1" placeholder="Dirección">
                    <input type="text" id="p_mail" class="form-control" placeholder="Correo">
                </div>
            </div>

            <div class="section-header">IV. REFERENCIAS</div>
            <div class="row g-2 mt-1">
                <div class="col-md-4"><label>EMPRESA 1</label><input type="text" id="r_e1" class="form-control mb-1" placeholder="Nombre"><input type="text" id="r_t1" class="form-control" placeholder="Teléfono"></div>
                <div class="col-md-4"><label>EMPRESA 2</label><input type="text" id="r_e2" class="form-control mb-1" placeholder="Nombre"><input type="text" id="r_t2" class="form-control" placeholder="Teléfono"></div>
                <div class="col-md-4"><label>PERSONAL</label><input type="text" id="r_per" class="form-control mb-1" placeholder="Nombre"><input type="text" id="r_tp" class="form-control" placeholder="Teléfono"></div>
            </div>
        </form>
    </div>
</div>

<script>
    function alerta(id, label) {
        const el = document.getElementById(id);
        if(!el || !el.value) return "";
        const diff = (new Date(el.value) - new Date()) / 86400000;
        el.classList.remove('vencido', 'por-vencer');
        if(diff < 0) { el.classList.add('vencido'); return `❌ ${label} VENCIDO\n`; }
        if(diff <= 15) { el.classList.add('por-vencer'); return `⚠️ ${label} POR VENCER\n`; }
        return "";
    }

    async function consultar() {
        const res = await fetch(`/consultar/${document.getElementById('q').value}`);
        if(res.ok) llenar(await res.json()); else alert("No encontrado");
    }

    async function guardar() {
        const d = {
            v: { placa: val('v_placa'), marca: val('v_marca'), modelo: val('v_modelo'), soat: val('v_soat'), tecno: val('v_tecno'), gps_co: val('v_gps_co'), user: val('v_gps_user'), pass: val('v_gps_pass') },
            c: { nom: val('c_nom'), cc: val('c_cc'), venc_cc: val('c_venc_cc'), eps: val('c_eps'), venc_eps: val('c_venc_eps'), arl: val('c_arl'), venc_arl: val('c_venc_arl'), pension: val('c_pension'), venc_planilla: val('c_venc_planilla'), mail: val('c_mail') },
            t: { nom: val('t_nom'), nit: val('t_nit'), tel: val('t_tel'), dir: val('t_dir'), mail: val('t_mail') },
            p: { nom: val('p_nom'), nit: val('p_nit'), tel: val('p_tel'), dir: val('p_dir'), mail: val('p_mail') },
            r: { e1: val('r_e1'), t1: val('r_t1'), e2: val('r_e2'), t2: val('r_t2'), per: val('r_per'), tp: val('r_tp') }
        };
        const res = await fetch('/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert((await res.json()).mensaje);
    }

    function llenar(d) {
        // Llenado total campo por campo para evitar "cortes"
        set('v_placa', d.v.placa); set('v_marca', d.v.marca); set('v_modelo', d.v.modelo); set('v_soat', d.v.soat); set('v_tecno', d.v.tecno); set('v_gps_co', d.v.gps_co); set('v_gps_user', d.v.user); set('v_gps_pass', d.v.pass);
        set('c_nom', d.c.nom); set('c_cc', d.c.cc); set('c_venc_cc', d.c.venc_cc); set('c_eps', d.c.eps); set('c_venc_eps', d.c.venc_eps); set('c_arl', d.c.arl); set('c_venc_arl', d.c.venc_arl); set('c_pension', d.c.pension); set('c_venc_planilla', d.c.venc_planilla); set('c_mail', d.c.mail);
        set('t_nom', d.t.nom); set('t_nit', d.t.nit); set('t_tel', d.t.tel); set('t_dir', d.t.dir); set('t_mail', d.t.mail);
        set('p_nom', d.p.nom); set('p_nit', d.p.nit); set('p_tel', d.p.tel); set('p_dir', d.p.dir); set('p_mail', d.p.mail);
        set('r_e1', d.r.e1); set('r_t1', d.r.t1); set('r_e2', d.r.e2); set('r_t2', d.r.t2); set('r_per', d.r.per); set('r_tp', d.r.tp);

        setTimeout(() => {
            let m = alerta('v_soat', 'SOAT') + alerta('v_tecno', 'TECNO') + alerta('c_venc_cc', 'CÉDULA') + alerta('c_venc_eps', 'EPS') + alerta('c_venc_arl', 'ARL') + alerta('c_venc_planilla', 'PLANILLA');
            if(m) alert(m);
        }, 600);
    }

    function val(id) { return document.getElementById(id).value; }
    function set(id, v) { if(document.getElementById(id)) document.getElementById(id).value = v || ''; }
    async function importar() {
        const formData = new FormData();
        formData.append('archivo', document.getElementById('f').files[0]);
        const res = await fetch('/importar', { method: 'POST', body: formData });
        llenar(await res.json());
    }
</script>
</body>
</html>
